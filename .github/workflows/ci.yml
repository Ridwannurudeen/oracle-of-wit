name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Unit tests with coverage
        run: npx vitest run --coverage --exclude tests/e2e/**

      - name: Build
        run: npm run build --if-present
