<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle of Wit - GenLayer Community Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    void: '#050505',
                    obsidian: '#0A0A12',
                    wit: { DEFAULT: '#A855F7', dim: '#7c3aed', bright: '#c084fc' },
                    oracle: { DEFAULT: '#2DD4BF', dim: '#14b8a6', bright: '#5eead4' },
                    consensus: { DEFAULT: '#FBBF24', dim: '#f59e0b', bright: '#fde68a' },
                },
                fontFamily: {
                    display: ['Clash Display', 'Space Grotesk', 'sans-serif'],
                    mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    body: ['Space Grotesk', 'sans-serif'],
                }
            }
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
        @font-face { font-family: 'Clash Display'; src: url('https://cdn.fontshare.com/wf/YFLQMJRNFGCUWTAQWHISJVQXGG4WKPGX/Y2THQT62O5V3BKQFXNM7YDYLWSSLBK4T/CPUHQKZSLCF4GFVG2MI3M3GJDTUOAMMS.woff2') format('woff2'); font-weight: 400 700; font-display: swap; }

        * { font-family: 'Space Grotesk', sans-serif; box-sizing: border-box; }
        body { background: #050505; overflow-x: hidden; }
        h1, h2, h3, .font-display { font-family: 'Clash Display', 'Space Grotesk', sans-serif; letter-spacing: 0.02em; }
        .font-mono, code, .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }

        /* === LIQUID GLASSMORPHISM === */
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(20px) saturate(1.2); border: 1px solid rgba(255,255,255,0.04); border-radius: 16px; }
        .glass-bright { background: rgba(255,255,255,0.04); backdrop-filter: blur(24px) saturate(1.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; }
        .glow-card { position: relative; background: rgba(10,10,18,0.5); backdrop-filter: blur(20px) saturate(1.3); border-radius: 16px; overflow: hidden; transition: transform 0.15s ease, box-shadow 0.3s ease; }
        .glow-card:hover { transform: translateY(-1px); box-shadow: 0 8px 40px rgba(168,85,247,0.15); }
        .glow-card::before { content:''; position:absolute; inset:-1px; border-radius:17px; padding:1px; background:linear-gradient(135deg,rgba(168,85,247,0.5),rgba(45,212,191,0.3),rgba(168,85,247,0.5)); -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events:none; }
        .glow-card-gold::before { background:linear-gradient(135deg,rgba(251,191,36,0.5),rgba(245,158,11,0.25),rgba(251,191,36,0.5)); }
        .glow-card-red::before { background:linear-gradient(135deg,rgba(239,68,68,0.4),rgba(185,28,28,0.2),rgba(239,68,68,0.4)); }
        .glow-card-cyan::before { background:linear-gradient(135deg,rgba(45,212,191,0.4),rgba(20,184,166,0.2),rgba(45,212,191,0.4)); }
        .glow-card-green::before { background:linear-gradient(135deg,rgba(34,197,94,0.4),rgba(22,163,74,0.2),rgba(34,197,94,0.4)); }
        .glow-card-amber::before { background:linear-gradient(135deg,rgba(251,191,36,0.35),rgba(245,158,11,0.15),rgba(251,191,36,0.35)); }

        /* === GRADIENT TEXT === */
        .gradient-text { background: linear-gradient(135deg, #FBBF24, #A855F7, #2DD4BF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .gradient-text-blue { background: linear-gradient(135deg, #2DD4BF, #A855F7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        /* === ORACLE EYE — Procedural === */
        .oracle-eye { position: relative; background: radial-gradient(circle at var(--eye-x, 40%) var(--eye-y, 40%), #A855F7 0%, #6366f1 40%, #0A0A12 80%); box-shadow: 0 0 60px rgba(168,85,247,0.5), 0 0 120px rgba(45,212,191,0.15), inset 0 0 30px rgba(0,0,0,0.5); }
        .oracle-eye::after { content: ''; position: absolute; inset: 20%; border-radius: 50%; background: radial-gradient(circle, #fff 0%, #A855F7 40%, transparent 70%); opacity: 0.7; transition: all 0.3s ease; }
        .oracle-eye.processing { animation: eyePulse 1.5s ease-in-out infinite; }
        .oracle-eye.processing::after { animation: eyeInnerPulse 0.8s ease-in-out infinite alternate; }
        @keyframes eyePulse { 0%,100% { box-shadow: 0 0 60px rgba(168,85,247,0.5), 0 0 120px rgba(45,212,191,0.15); } 50% { box-shadow: 0 0 100px rgba(168,85,247,0.8), 0 0 200px rgba(45,212,191,0.3); } }
        @keyframes eyeInnerPulse { from { opacity: 0.5; transform: scale(0.9); } to { opacity: 1; transform: scale(1.1); } }

        /* === BUTTONS — Mechanical feel === */
        .btn { transition: all 0.1s ease; cursor: pointer; font-weight: 600; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em; text-transform: uppercase; font-size: 0.8rem; }
        .btn:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.1); }
        .btn:active:not(:disabled) { transform: translateY(1px); filter: brightness(0.95); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        /* btn-primary defined in enhanced buttons section below */
        .btn-play { background: linear-gradient(135deg, #FBBF24, #f59e0b); border: 1px solid rgba(251,191,36,0.3); box-shadow: 0 4px 20px rgba(251,191,36,0.2); color: #0A0A12; }
        .btn-play:hover:not(:disabled) { box-shadow: 0 6px 30px rgba(251,191,36,0.4); }
        .btn-ghost { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); }
        .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.06); border-color: rgba(168,85,247,0.3); }
        .btn-teal { background: linear-gradient(135deg, #14b8a6, #2DD4BF); border: 1px solid rgba(45,212,191,0.3); box-shadow: 0 4px 20px rgba(45,212,191,0.2); }

        /* === CATEGORY PILLS === */
        .cat-btn { position:relative; overflow:hidden; transition:all 0.15s ease; border: 1px solid rgba(255,255,255,0.06); }
        .cat-btn::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.08) 0%,transparent 50%); pointer-events:none; border-radius:inherit; }
        .cat-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,0,0,0.4); border-color: rgba(168,85,247,0.3); }
        .card-selected { background: rgba(168,85,247,0.15) !important; border: 1px solid rgba(168,85,247,0.5) !important; box-shadow: 0 0 30px rgba(168,85,247,0.15); }

        /* === SPINNER === */
        .spinner { border: 2px solid rgba(168,85,247,0.1); border-top-color: #2DD4BF; border-radius: 50%; animation: spin 0.8s linear infinite; width: 20px; height: 20px; }

        /* === ANIMATIONS === */
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .animate-float { animation: float 4s ease-in-out infinite; }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 30px rgba(168,85,247,0.4); } 50% { box-shadow: 0 0 80px rgba(168,85,247,0.7); } }
        .animate-glow { animation: pulse-glow 2s ease-in-out infinite; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        @keyframes countdown-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
        .countdown-critical { animation: countdown-pulse 0.5s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .confetti { position: fixed; width: 8px; height: 8px; pointer-events: none; z-index: 1000; }
        @keyframes confetti-fall { 0% { transform: translateY(-100vh) rotate(0deg); opacity:1; } 100% { transform: translateY(100vh) rotate(720deg); opacity:0; } }
        .timer-bar { transition: width 0.5s linear; }
        textarea, input[type="text"] { background: rgba(10,10,18,0.9) !important; color: white !important; border: 1px solid rgba(168,85,247,0.15) !important; font-family: 'JetBrains Mono', monospace !important; font-size: 0.9rem; }
        textarea:focus, input[type="text"]:focus { border-color: rgba(45,212,191,0.5) !important; box-shadow: 0 0 20px rgba(45,212,191,0.1); outline: none; }
        .rotate-180 { transform: rotate(180deg); }
        .transition-transform { transition: transform 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
        .animate-fadeIn { animation: fadeIn 0.25s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-scaleIn { animation: scaleIn 0.25s ease-out; }
        @keyframes slideInRight { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slideIn { animation: slideInRight 0.4s ease-out; }
        @keyframes slideOutLeft { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30px); opacity: 0; } }
        .animate-slideOut { animation: slideOutLeft 0.3s ease-in forwards; }
        @keyframes goldPulse { 0%,100% { box-shadow: 0 0 20px rgba(251,191,36,0.4); } 50% { box-shadow: 0 0 60px rgba(251,191,36,0.7); } }
        .animate-goldPulse { animation: goldPulse 1.5s ease-in-out infinite; }
        @keyframes winnerScale { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-winnerScale { animation: winnerScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes screenFlash { 0% { opacity: 0; } 30% { opacity: 0.2; } 100% { opacity: 0; } }
        .screen-flash { animation: screenFlash 0.5s ease-out; position: fixed; inset: 0; background: linear-gradient(135deg, #FBBF24, #A855F7); pointer-events: none; z-index: 999; }
        @keyframes meterFill { from { width: 0%; } to { width: var(--fill-pct); } }
        .meter-fill { animation: meterFill 1.5s ease-out forwards; }
        @keyframes typewriter { from { width: 0; } to { width: 100%; } }
        .typewriter { overflow: hidden; white-space: nowrap; animation: typewriter 1s steps(40) forwards; display: inline-block; max-width: 100%; }
        @keyframes emojiFloat { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-50px) scale(1.2); opacity: 0; } }
        .emoji-float { position: absolute; animation: emojiFloat 1.5s ease-out forwards; pointer-events: none; font-size: 1.5rem; }
        @keyframes screenShake { 0%,100% { transform: translateX(0); } 10% { transform: translateX(-6px) rotate(-0.5deg); } 30% { transform: translateX(6px) rotate(0.5deg); } 50% { transform: translateX(-4px); } 70% { transform: translateX(4px); } }
        .animate-screenShake { animation: screenShake 0.5s ease-in-out; }
        @keyframes comebackBanner { 0% { transform: scale(0) rotate(-5deg); opacity: 0; } 50% { transform: scale(1.1) rotate(2deg); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .animate-comeback { animation: comebackBanner 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .streak-fire { text-shadow: 0 0 8px #FBBF24, 0 0 16px #ef4444; }
        @keyframes toastIn { from { transform: translateY(-100%) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-16px); } }
        .toast-in { animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .toast-out { animation: toastOut 0.3s ease-in forwards; }
        .xp-bar { background: linear-gradient(90deg, #A855F7, #2DD4BF, #FBBF24); transition: width 1s ease-out; border-radius: 999px; }
        @keyframes countUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .stat-count { animation: countUp 0.4s ease-out backwards; }

        /* === SCROLLBAR === */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.2); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(168,85,247,0.4); }

        /* === TABS === */
        .tab-active { background: rgba(168,85,247,0.1); border-bottom: 2px solid #A855F7; }
        .tab-inactive { background: transparent; border-bottom: 2px solid transparent; }
        .tab-inactive:hover { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.06); }

        /* === HIGH STAKES MODE — shifts palette to amber === */
        .high-stakes .glow-card::before { background: linear-gradient(135deg,rgba(251,191,36,0.4),rgba(245,158,11,0.2),rgba(251,191,36,0.4)) !important; }
        .high-stakes .oracle-eye { background: radial-gradient(circle at var(--eye-x, 40%) var(--eye-y, 40%), #FBBF24 0%, #f59e0b 40%, #0A0A12 80%) !important; box-shadow: 0 0 60px rgba(251,191,36,0.5), 0 0 120px rgba(245,158,11,0.2) !important; }
        .high-stakes .btn-primary { background: linear-gradient(135deg, #f59e0b, #FBBF24) !important; }

        /* === PARTICLE CANVAS === */
        #mist-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.6; }

        /* === CONSENSUS HUD === */
        .consensus-hud { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; letter-spacing: 0.05em; text-transform: uppercase; }
        .hud-dot { width: 6px; height: 6px; border-radius: 50%; animation: hudPulse 2s ease-in-out infinite; }
        @keyframes hudPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* === SHATTERING GLASS OVERLAY === */
        @keyframes shatterPiece { 0% { opacity: 1; transform: translate(0,0) rotate(0deg); } 100% { opacity: 0; transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); } }
        .shatter-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        .shatter-piece { position: absolute; background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.3); animation: shatterPiece 0.8s ease-out forwards; }

        /* === DATA STREAM OVERLAY === */
        @keyframes dataStream { 0% { transform: translateY(-100%); opacity: 0; } 10% { opacity: 0.3; } 90% { opacity: 0.3; } 100% { transform: translateY(100%); opacity: 0; } }
        .data-stream { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 5; }
        .data-stream span { position: absolute; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(45,212,191,0.4); animation: dataStream 2s linear infinite; white-space: nowrap; }

        /* === GLASS PANEL (HUD Wings) === */
        .glass-panel { background: rgba(10,10,18,0.6); backdrop-filter: blur(24px) saturate(1.3); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; border-top-color: rgba(255,255,255,0.08); border-left-color: rgba(255,255,255,0.08); }
        .hud-wing { position: sticky; top: 80px; max-height: calc(100vh - 100px); overflow-y: auto; }

        /* === NEON BORDER UTILITIES === */
        @keyframes neonShift { 0%,100% { filter: hue-rotate(0deg); } 50% { filter: hue-rotate(15deg); } }
        .neon-border-wit { border: 1px solid rgba(168,85,247,0.4); box-shadow: 0 0 15px rgba(168,85,247,0.1), inset 0 0 15px rgba(168,85,247,0.05); }
        .neon-border-oracle { border: 1px solid rgba(45,212,191,0.4); box-shadow: 0 0 15px rgba(45,212,191,0.1), inset 0 0 15px rgba(45,212,191,0.05); }
        .neon-border-consensus { border: 1px solid rgba(251,191,36,0.4); box-shadow: 0 0 15px rgba(251,191,36,0.1), inset 0 0 15px rgba(251,191,36,0.05); }

        /* === ENHANCED BUTTONS === */
        .btn-primary { background: linear-gradient(135deg, #7c3aed, #A855F7); border: 1px solid rgba(168,85,247,0.3); box-shadow: 0 4px 20px rgba(168,85,247,0.25), inset 0 1px 0 rgba(255,255,255,0.1); }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 8px 40px rgba(168,85,247,0.5), inset 0 1px 0 rgba(255,255,255,0.15); border-color: rgba(168,85,247,0.5); }
        .btn-danger { background: linear-gradient(135deg, #b91c1c, #dc2626); border: 1px solid rgba(239,68,68,0.3); box-shadow: 0 4px 20px rgba(239,68,68,0.2); color: white; }
        .btn-danger:hover:not(:disabled) { box-shadow: 0 8px 40px rgba(239,68,68,0.4); }

        /* === FLOATING NAV === */
        .header-float { border-radius: 16px; margin: 12px 16px 0; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .header-transition { transition: all 0.3s ease; }

        /* === BOOT SEQUENCE === */
        @keyframes bootType { from { width: 0; } to { width: 100%; } }
        .boot-text { font-family: 'JetBrains Mono', monospace; overflow: hidden; white-space: nowrap; border-right: 2px solid rgba(168,85,247,0.8); animation: bootType 0.5s steps(20) forwards, blink-caret 0.5s step-end infinite; }
        @keyframes blink-caret { from,to { border-color: transparent; } 50% { border-color: rgba(168,85,247,0.8); } }
        .boot-progress { height: 3px; background: linear-gradient(90deg, #7c3aed, #A855F7, #2DD4BF); border-radius: 999px; transition: width 0.4s ease; }

        /* === DATA CARD (Onboarding) === */
        .data-card { position: relative; padding: 1.25rem; border-radius: 16px; background: rgba(255,255,255,0.04); backdrop-filter: blur(24px) saturate(1.3); border: 1px solid rgba(255,255,255,0.08); transition: transform 0.2s ease, box-shadow 0.3s ease; }
        .data-card:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 40px rgba(168,85,247,0.15); }
        .data-card-wit { border-color: rgba(168,85,247,0.3); }
        .data-card-wit:hover { box-shadow: 0 12px 40px rgba(168,85,247,0.2); }
        .data-card-oracle { border-color: rgba(45,212,191,0.3); }
        .data-card-oracle:hover { box-shadow: 0 12px 40px rgba(45,212,191,0.2); }
        .data-card-consensus { border-color: rgba(251,191,36,0.3); }
        .data-card-consensus:hover { box-shadow: 0 12px 40px rgba(251,191,36,0.2); }

        /* === 3D EYE CANVAS === */
        .oracle-eye-3d { border-radius: 50%; overflow: hidden; }

        /* === HUD WING EVENT ITEM === */
        .wing-event { animation: fadeIn 0.3s ease-out; border-left: 2px solid rgba(168,85,247,0.3); padding-left: 8px; }

        /* === SCREEN TRANSITIONS === */
        @keyframes screenFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .screen-enter { animation: screenFadeIn 0.3s ease-out; }

        /* === SKELETON LOADING === */
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.02) 75%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 8px; }
        .skeleton-text { height: 12px; margin-bottom: 8px; }
        .skeleton-card { height: 80px; margin-bottom: 12px; }
        .skeleton-circle { border-radius: 50%; }

        /* === BUTTON LOADING STATE === */
        .btn-loading { position: relative; color: transparent !important; pointer-events: none; }
        .btn-loading::after { content: ''; position: absolute; width: 16px; height: 16px; top: 50%; left: 50%; margin: -8px 0 0 -8px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }

        /* === CUSTOM RANGE SLIDER === */
        input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; background: rgba(10,10,18,0.9); border-radius: 3px; border: 1px solid rgba(255,255,255,0.06); outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, #A855F7, #7c3aed); border: 2px solid rgba(255,255,255,0.15); cursor: pointer; box-shadow: 0 0 10px rgba(168,85,247,0.4); }
        input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, #A855F7, #7c3aed); border: 2px solid rgba(255,255,255,0.15); cursor: pointer; box-shadow: 0 0 10px rgba(168,85,247,0.4); }
    </style>
</head>
<body class="min-h-screen text-white">
    <!-- Nebula mesh gradient background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10" style="background:#050505">
        <div class="absolute top-0 left-0 w-full h-full" style="background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(168,85,247,0.08),transparent),radial-gradient(ellipse 60% 80% at 80% 70%,rgba(45,212,191,0.05),transparent),radial-gradient(ellipse 50% 50% at 50% 50%,rgba(251,191,36,0.02),transparent)"></div>
    </div>
    <!-- Data Mist particle canvas -->
    <canvas id="mist-canvas"></canvas>
    <div id="app"></div>

<script>
// === DATA MIST PARTICLE SYSTEM ===
(function initMist() {
    const c = document.getElementById('mist-canvas');
    if (!c) return;
    const ctx = c.getContext('2d');
    let w, h, particles = [], mouseX = 0, mouseY = 0;

    function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

    for (let i = 0; i < 60; i++) {
        particles.push({
            x: Math.random() * w, y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.2,
            r: Math.random() * 2 + 0.5,
            color: Math.random() > 0.5 ? 'rgba(168,85,247,' : 'rgba(45,212,191,',
            alpha: Math.random() * 0.3 + 0.05
        });
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        for (const p of particles) {
            // Subtle mouse repulsion
            const dx = p.x - mouseX, dy = p.y - mouseY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 150) {
                p.vx += dx / dist * 0.02;
                p.vy += dy / dist * 0.02;
            }
            p.x += p.vx; p.y += p.vy;
            p.vx *= 0.99; p.vy *= 0.99;
            if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color + p.alpha + ')';
            ctx.fill();
        }
        requestAnimationFrame(draw);
    }
    draw();
})();

// === 3D ORACLE EYE (Three.js) ===
class OracleEye3D {
    constructor() {
        this.instances = [];
        this.mouseX = 0;
        this.mouseY = 0;
        this.targetX = 0;
        this.targetY = 0;
        this.gameColor = { r: 0.66, g: 0.33, b: 0.97 }; // wit purple
        this.targetColor = { r: 0.66, g: 0.33, b: 0.97 };
        this.pupilDilation = 0.3;
        this.targetDilation = 0.3;
        this.pulseSpeed = 1.0;
        this.available = typeof THREE !== 'undefined';

        if (this.available) {
            document.addEventListener('mousemove', e => {
                this.mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                this.mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });
        }
    }

    mount(container, size = 160) {
        if (!this.available) return null;
        try {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
            camera.position.z = 3;

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(size, size);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 0);

            // Outer eye sphere (sclera glow)
            const outerGeo = new THREE.SphereGeometry(1, 64, 64);
            const outerMat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uMouse: { value: new THREE.Vector2(0, 0) },
                    uColor: { value: new THREE.Vector3(0.66, 0.33, 0.97) },
                    uDilation: { value: 0.3 },
                    uPulseSpeed: { value: 1.0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uTime;
                    uniform vec2 uMouse;
                    uniform vec3 uColor;
                    uniform float uDilation;
                    uniform float uPulseSpeed;
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vPosition;

                    void main() {
                        vec2 center = vec2(0.5) + uMouse * 0.08;
                        float dist = distance(vUv, center);

                        // Iris
                        float irisRadius = 0.35;
                        float iris = smoothstep(irisRadius + 0.02, irisRadius - 0.02, dist);

                        // Pupil
                        float pupilRadius = uDilation;
                        float pupil = smoothstep(pupilRadius + 0.02, pupilRadius - 0.02, dist);

                        // Specular highlight
                        vec2 specPos = center + vec2(-0.1, 0.12);
                        float spec = smoothstep(0.08, 0.0, distance(vUv, specPos));

                        // Iris color with animated rings
                        float rings = sin(dist * 40.0 + uTime * 0.5) * 0.1 + 0.9;
                        vec3 irisColor = uColor * rings;
                        irisColor += vec3(0.1, 0.3, 0.3) * sin(uTime * 0.3 + dist * 10.0) * 0.15;

                        // Compose
                        vec3 scleraColor = vec3(0.04, 0.04, 0.07);
                        float pulse = sin(uTime * uPulseSpeed) * 0.15 + 0.85;

                        // Fresnel rim glow
                        float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 3.0);
                        vec3 rimColor = uColor * fresnel * 0.6 * pulse;

                        vec3 color = scleraColor;
                        color = mix(color, irisColor * pulse, iris);
                        color = mix(color, vec3(0.01), pupil);
                        color += vec3(1.0) * spec * 0.8;
                        color += rimColor;

                        // Outer glow falloff
                        float alpha = smoothstep(0.5, 0.35, length(vPosition.xy));
                        alpha = max(alpha, fresnel * 0.3);

                        gl_FragColor = vec4(color, alpha);
                    }
                `,
                transparent: true
            });

            const eyeMesh = new THREE.Mesh(outerGeo, outerMat);
            scene.add(eyeMesh);

            // Outer glow sprite
            const spriteMat = new THREE.SpriteMaterial({
                color: 0xa855f7,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending
            });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(3, 3, 1);
            scene.add(sprite);

            container.appendChild(renderer.domElement);
            renderer.domElement.style.borderRadius = '50%';

            const instance = { scene, camera, renderer, eyeMesh, outerMat, sprite, spriteMat, size, active: true };
            this.instances.push(instance);

            return instance;
        } catch(e) {
            return null;
        }
    }

    setGameState(stateName) {
        switch(stateName) {
            case 'idle': case 'welcome': case 'lobby':
                this.targetColor = { r: 0.66, g: 0.33, b: 0.97 }; // wit purple
                this.pulseSpeed = 1.0;
                this.targetDilation = 0.3;
                break;
            case 'judging': case 'curating':
                this.targetColor = { r: 0.18, g: 0.83, b: 0.75 }; // oracle teal
                this.pulseSpeed = 2.0;
                this.targetDilation = 0.25;
                break;
            case 'roundResults': case 'finished':
                this.targetColor = { r: 0.98, g: 0.75, b: 0.14 }; // consensus gold
                this.pulseSpeed = 0.5;
                this.targetDilation = 0.35;
                break;
            case 'submitting':
                this.targetColor = { r: 0.66, g: 0.33, b: 0.97 };
                this.pulseSpeed = 1.2;
                this.targetDilation = 0.28;
                break;
            case 'betting':
                this.targetColor = { r: 0.96, g: 0.62, b: 0.04 };
                this.pulseSpeed = 1.5;
                this.targetDilation = 0.22;
                break;
            default:
                this.targetColor = { r: 0.66, g: 0.33, b: 0.97 };
                this.pulseSpeed = 1.0;
                this.targetDilation = 0.3;
        }
    }

    dilate() { this.targetDilation = 0.45; }
    undilate() { this.targetDilation = 0.3; }

    animate() {
        // Smooth lerp mouse
        this.targetX += (this.mouseX - this.targetX) * 0.08;
        this.targetY += (this.mouseY - this.targetY) * 0.08;

        // Smooth lerp color
        this.gameColor.r += (this.targetColor.r - this.gameColor.r) * 0.03;
        this.gameColor.g += (this.targetColor.g - this.gameColor.g) * 0.03;
        this.gameColor.b += (this.targetColor.b - this.gameColor.b) * 0.03;

        // Smooth lerp dilation
        this.pupilDilation += (this.targetDilation - this.pupilDilation) * 0.05;

        const time = performance.now() * 0.001;

        for (const inst of this.instances) {
            if (!inst.active || !inst.renderer.domElement.isConnected) {
                inst.active = false;
                continue;
            }

            inst.outerMat.uniforms.uTime.value = time;
            inst.outerMat.uniforms.uMouse.value.set(this.targetX, this.targetY);
            inst.outerMat.uniforms.uColor.value.set(this.gameColor.r, this.gameColor.g, this.gameColor.b);
            inst.outerMat.uniforms.uDilation.value = this.pupilDilation;
            inst.outerMat.uniforms.uPulseSpeed.value = this.pulseSpeed;

            // Subtle mesh rotation following mouse
            inst.eyeMesh.rotation.y = this.targetX * 0.15;
            inst.eyeMesh.rotation.x = -this.targetY * 0.15;

            // Glow sprite pulse
            const pulse = Math.sin(time * this.pulseSpeed) * 0.05 + 0.15;
            inst.spriteMat.opacity = pulse;
            inst.spriteMat.color.setRGB(this.gameColor.r, this.gameColor.g, this.gameColor.b);

            inst.renderer.render(inst.scene, inst.camera);
        }

        // Clean up disconnected instances
        this.instances = this.instances.filter(i => i.active);

        requestAnimationFrame(() => this.animate());
    }

    start() {
        if (this.available) this.animate();
    }
}

function playSound(type) {
    if (!soundEnabled || !audioCtx) return;
    const sounds = {
        click: [600, 0.1, 'sine'],
        submit: [800, 0.15, 'sine'],
        bet: [500, 0.2, 'triangle'],
        win: [[523,659,784], 0.3, 'sine'],
        tick: [1000, 0.05, 'square'],
        start: [[440,554,659], 0.2, 'sine'],
        warning: [[440,220], 0.3, 'sawtooth'],
        eliminate: [[400,200], 0.1, 'sine'],
        reveal: [[523,659,784,1047], 0.4, 'sine'],
        loss: [150, 0.2, 'sawtooth'],
        drumroll: null, // special handling below
        streak: [[660,880,1100], 0.3, 'sine']
    };
    // Drumroll: ascending sweep
    if (type === 'drumroll') {
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.6);
        } catch(e) {}
        return;
    }
    const s = sounds[type];
    if (!s) return;
    try {
        const freqs = Array.isArray(s[0]) ? s[0] : [s[0]];
        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = f; osc.type = s[2];
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + s[1]);
            osc.start(audioCtx.currentTime + i * 0.1);
            osc.stop(audioCtx.currentTime + s[1] + i * 0.1);
        });
    } catch(e) {}
}

function syncTimer() {
    if (!state.room?.phaseEndsAt) { state.timeLeft = 0; return; }
    state.timeLeft = Math.max(0, Math.floor((state.room.phaseEndsAt - Date.now()) / 1000));
}

function startTimer() {
    stopTimer();
    lastTimerSecond = -1;
    function tick() {
        // Always recalculate from phaseEndsAt — no drift, no freeze
        if (state.room?.phaseEndsAt) {
            state.timeLeft = Math.max(0, Math.floor((state.room.phaseEndsAt - Date.now()) / 1000));
        }
        // Only update DOM + play sounds when the second actually changes
        if (state.timeLeft !== lastTimerSecond) {
            lastTimerSecond = state.timeLeft;
            if (state.timeLeft <= 5 && state.timeLeft > 0) playSound('tick');
            if (state.timeLeft === 10) playSound('warning');
            updateTimerDisplay();
        }
        timerRAF = requestAnimationFrame(tick);
    }
    timerRAF = requestAnimationFrame(tick);
}

function stopTimer() {
    if (timerRAF) { cancelAnimationFrame(timerRAF); timerRAF = null; }
    lastTimerSecond = -1;
}

function formatTime(s) {
    return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

async function api(action, data = {}) {
    state.loading = true;
    state.error = null;
    // Don't render during loading if user is typing
    if (!isTyping) render();
    try {
        const res = await fetch(`${API_URL}?action=${action}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        state.loading = false;
        if (!res.ok || result.error) throw new Error(result.error || 'Error');
        return result;
    } catch (e) {
        state.loading = false;
        state.error = e.message;
        render(true); // Force render to show error
        throw e;
    }
}

async function fetchRoom() {
    if (!state.roomId) return;
    try {
        const res = await fetch(`${API_URL}?action=getRoom&roomId=${state.roomId}`);
        const result = await res.json();
        if (!result.success || !result.room) {
            // Room expired on server — auto-recover
            leaveRoom();
            state.error = 'Room expired. Returned to lobby.';
            render(true);
            return;
        }
        if (result.success && result.room) {
            const oldStatus = state.room?.status;
            const oldSubmissionCount = state.room?.submissions?.length || 0;
            const oldBetCount = state.room?.bets?.length || 0;
            const oldPlayerCount = state.room?.players?.length || 0;

            state.room = result.room;
            syncTimer();
            
            // Only render if status changed
            if (state.room.status !== oldStatus) {
                handlePhaseChange(oldStatus, state.room.status);
                render(true); // Force render on phase change
                return;
            }
            
            // Check if something important changed
            const newSubmissionCount = state.room?.submissions?.length || 0;
            const newBetCount = state.room?.bets?.length || 0;
            const newPlayerCount = state.room?.players?.length || 0;

            const hasImportantChange =
                newSubmissionCount !== oldSubmissionCount ||
                newBetCount !== oldBetCount ||
                newPlayerCount !== oldPlayerCount;

            if (hasImportantChange) {
                // During active input phases, do lightweight DOM patches instead of full rebuild
                if (isTyping || document.activeElement?.id === 'punchline') {
                    updateHUDPartials(newSubmissionCount, newPlayerCount, newBetCount);
                } else {
                    render();
                }
            }
            // Always update timer display
            updateTimerDisplay();
        }
    } catch (e) {
        console.warn('[Poll] fetchRoom failed:', e.message);
    }
}

function handlePhaseChange(oldStatus, newStatus) {
    // Always clean up reveal state on any phase transition
    stopRevealSequence();
    // Reset typing flag on phase change
    isTyping = false;
    if (typingTimeout) clearTimeout(typingTimeout);

    state.screen = newStatus === 'roundResults' ? 'roundResults' : newStatus;
    // Track game events for HUD wings
    if (newStatus === 'submitting') addGameEvent('round', 'Round ' + (state.room?.currentRound || '?') + ' started');
    if (newStatus === 'betting') addGameEvent('phase', 'Betting phase opened');
    if (newStatus === 'judging') addGameEvent('oracle', 'Oracle judging in progress');
    if (newStatus === 'roundResults') addGameEvent('result', 'Round results revealed');
    if (newStatus === 'finished') addGameEvent('end', 'Game complete!');
    if (newStatus === 'submitting') {
        playSound('start');
        state.hasSubmitted = false;
        state.punchlineText = '';
        // Reset validator voting state for new round
        state.validatorVotingStarted = false;
        state.validatorVotes = [];
        state.consensusReached = false;
        state.winningSubmissionId = null;
        state.sentReactions = 0;
        syncTimer();
        startTimer();
    } else if (newStatus === 'curating') {
        playSound('click');
    } else if (newStatus === 'voting') {
        playSound('click');
        state.votedFor = null;
        syncTimer();
        startTimer();
    } else if (newStatus === 'betting') {
        playSound('click');
        state.hasBet = false;
        state.selectedSubmission = null;
        state.sentReactions = 0;
        syncTimer();
        startTimer();
    } else if (newStatus === 'roundResults') {
        stopTimer();
        stopValidatorVoting();
        generateFinalValidatorVotes();
        // Start dramatic reveal instead of jumping to results
        state.revealPhase = 'revealing';
        state.revealIndex = -1;
        state.revealedJokes = [];
        state.sentReactions = 0;
        startRevealSequence();
    } else if (newStatus === 'finished') {
        stopTimer();
        stopPolling();
        stopValidatorVoting();
        playSound('win');
        createConfetti();
    } else if (newStatus === 'judging') {
        stopTimer();
        // Reset for new judging phase
        state.validatorVotingStarted = false;
        state.validatorVotes = [];
        state.consensusReached = false;
    }
}

// Generate validator votes based on actual round result
function generateFinalValidatorVotes() {
    const result = state.room?.roundResults?.[state.room.roundResults.length - 1];
    if (!result) return;
    
    const winnerId = result.winnerId;
    const submissions = state.room?.submissions || [];
    const otherIds = submissions.map(s => s.id).filter(id => id !== winnerId);
    
    // Generate 5 validator votes - majority (4-5) agree on winner
    state.validatorVotes = [];
    for (let i = 0; i < 5; i++) {
        // 4 validators agree, 1 might disagree (to show democracy)
        if (i < 4 || Math.random() > 0.5) {
            state.validatorVotes.push(winnerId);
        } else if (otherIds.length > 0) {
            // One validator disagrees
            state.validatorVotes.push(otherIds[Math.floor(Math.random() * otherIds.length)]);
        } else {
            state.validatorVotes.push(winnerId);
        }
    }
    state.consensusReached = true;
    state.winningSubmissionId = winnerId;
}

// Share card generation (Canvas API)
function generateShareCard(prompt, punchline, playerName, score, roast) {
    const canvas = document.createElement('canvas');
    canvas.width = 600; canvas.height = 400;
    const ctx = canvas.getContext('2d');

    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, 600, 400);
    grad.addColorStop(0, '#1e1b4b'); grad.addColorStop(0.5, '#312e81'); grad.addColorStop(1, '#4c1d95');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 600, 400);

    // Border
    ctx.strokeStyle = 'rgba(168,85,247,0.5)'; ctx.lineWidth = 2;
    ctx.strokeRect(10, 10, 580, 380);

    // Title
    ctx.fillStyle = '#f59e0b'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Oracle of Wit', 300, 45);
    ctx.fillStyle = '#a855f7'; ctx.font = '12px sans-serif';
    ctx.fillText('Powered by GenLayer', 300, 62);

    // Prompt
    ctx.fillStyle = '#94a3b8'; ctx.font = '14px sans-serif';
    wrapText(ctx, `"${prompt}"`, 300, 95, 520, 18);

    // Winning punchline
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 18px sans-serif';
    const punchY = wrapText(ctx, `"${punchline}"`, 300, 150, 520, 22);

    // Author
    ctx.fillStyle = '#fbbf24'; ctx.font = '14px sans-serif';
    ctx.fillText(`by ${playerName}`, 300, punchY + 25);

    // Roast
    if (roast) {
        ctx.fillStyle = '#94a3b8'; ctx.font = 'italic 13px sans-serif';
        wrapText(ctx, roast, 300, punchY + 55, 520, 17);
    }

    // Score
    ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 28px sans-serif';
    ctx.fillText(`${score} XP`, 300, 340);

    // CTA
    ctx.fillStyle = '#6366f1'; ctx.font = '12px sans-serif';
    ctx.fillText('oracle-of-wit.vercel.app', 300, 375);

    return canvas;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '', curY = y;
    for (const word of words) {
        const test = line + word + ' ';
        if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line.trim(), x, curY);
            line = word + ' '; curY += lineHeight;
        } else { line = test; }
    }
    ctx.fillText(line.trim(), x, curY);
    return curY;
}

function shareImage(prompt, punchline, playerName, score, roast) {
    const canvas = generateShareCard(prompt, punchline, playerName, score, roast);
    canvas.toBlob(blob => {
        if (navigator.share && navigator.canShare?.({ files: [new File([blob], 'oracle-of-wit.png', { type: 'image/png' })] })) {
            navigator.share({
                title: 'Oracle of Wit',
                text: `I scored ${score} XP on Oracle of Wit!`,
                files: [new File([blob], 'oracle-of-wit.png', { type: 'image/png' })]
            }).catch(() => {});
        } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'oracle-of-wit.png';
            a.click(); URL.revokeObjectURL(url);
        }
    }, 'image/png');
}

// Validator voting animation for Optimistic Democracy visualization
let validatorVotingInterval = null;

function startValidatorVoting() {
    if (validatorVotingInterval) return; // Already running
    
    state.validatorVotes = [];
    state.consensusReached = false;
    
    // Get submissions to simulate voting on
    const submissions = state.room?.submissions || [];
    const submissionIds = submissions.map(s => s.id);
    
    if (submissionIds.length === 0) return;
    
    // Determine the likely winner (first submission for simulation, 
    // actual winner comes from backend)
    let winningId = submissionIds[0];
    
    // Simulate validators voting one by one
    let voteIndex = 0;
    const validators = ['GPT-4', 'Claude', 'LLaMA', 'Gemini', 'Mixtral'];
    
    validatorVotingInterval = setInterval(() => {
        if (voteIndex >= 5) {
            // All validators voted
            state.consensusReached = true;
            playSound('click');
            render(true);
            stopValidatorVoting();
            return;
        }
        
        // Simulate validator voting
        // Most validators agree (4-5 out of 5) to show consensus
        let vote;
        if (voteIndex < 4 || Math.random() > 0.3) {
            vote = winningId; // Agree with consensus
        } else {
            // Occasionally a validator disagrees (shows democracy working)
            const otherIds = submissionIds.filter(id => id !== winningId);
            vote = otherIds.length > 0 ? otherIds[Math.floor(Math.random() * otherIds.length)] : winningId;
        }
        
        state.validatorVotes.push(vote);
        playSound('tick');
        
        // Check for majority (3/5)
        const voteCounts = {};
        state.validatorVotes.forEach(v => {
            voteCounts[v] = (voteCounts[v] || 0) + 1;
        });
        const maxVotes = Math.max(...Object.values(voteCounts));
        if (maxVotes >= 3 && !state.consensusReached) {
            // Find the winning submission ID
            state.winningSubmissionId = Object.keys(voteCounts).find(k => voteCounts[k] === maxVotes);
        }
        
        voteIndex++;
        render(true);
        
    }, 800); // Vote every 800ms for dramatic effect
}

function stopValidatorVoting() {
    if (validatorVotingInterval) {
        clearInterval(validatorVotingInterval);
        validatorVotingInterval = null;
    }
}

function formatEventTime(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 5) return 'just now';
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    return 'earlier';
}

function render(force = false) {
    // Skip render completely while typing (unless forced)
    // Also check if textarea is focused — isTyping timeout may have expired while user is still in the field
    const textareaFocused = document.activeElement?.id === 'punchline';
    if ((isTyping || textareaFocused) && !force) {
        updateTimerDisplay();
        return;
    }
    
    // Throttle renders to prevent freezing
    const now = Date.now();
    if (now - lastRenderTime < MIN_RENDER_INTERVAL && !force) {
        if (!renderPending) {
            renderPending = true;
            setTimeout(() => {
                renderPending = false;
                render();
            }, MIN_RENDER_INTERVAL);
        }
        return;
    }
    lastRenderTime = now;
    
    // Preserve textarea focus and cursor position
    const activeEl = document.activeElement;
    const wasTextareaFocused = activeEl && activeEl.id === 'punchline';
    let selectionStart = 0, selectionEnd = 0;
    if (wasTextareaFocused) {
        selectionStart = activeEl.selectionStart;
        selectionEnd = activeEl.selectionEnd;
    }
    
    // Track screen transitions for sound + tab title
    const prevScreen = document.getElementById('app')?.dataset?.screen;
    if (prevScreen && prevScreen !== state.screen) {
        playScreenTransition(prevScreen, state.screen);
    }
    // Update tab title
    const phaseLabel = state.room ? `[R${state.room.currentRound || 0}] ${(state.screen || '').toUpperCase()}` : '';
    document.title = phaseLabel ? `${phaseLabel} - Oracle of Wit` : 'Oracle of Wit - GenLayer Community Game';

    const isHighStakes = state.room?.betBudgets?.[state.playerName] !== undefined && (state.room.betBudgets[state.playerName] ?? 300) <= 50;

    appEl.innerHTML = `

    // Restore textarea focus and cursor position
    if (wasTextareaFocused) {
        const textarea = document.getElementById('punchline');
        if (textarea) {
            textarea.focus();
            textarea.setSelectionRange(selectionStart, selectionEnd);

    // Mount 3D oracle eyes after render
    requestAnimationFrame(() => {

}

function renderScreen() {
    // Reveal phase intercepts roundResults
    if (state.revealPhase === 'revealing') return renderRevealing();
    switch (state.screen) {
        case 'welcome': return renderWelcome();
        case 'lobby': return renderLobby();
        case 'waiting': return renderWaiting();
        case 'submitting': return renderSubmitting();
        case 'curating': return renderCurating();
        case 'voting': return renderVoting();
        case 'betting': return renderBetting();
        case 'judging': return renderJudging();
        case 'roundResults': return renderRoundResults();
        case 'finished': return renderFinalResults();
        case 'daily': return renderDailyChallenge();
        case 'profile': return renderProfileScreen();
        case 'hallOfFame': return renderHallOfFame();
        case 'communityPrompts': return renderCommunityPrompts();

}

// === DRAMATIC REVEAL SEQUENCE ===
// Track pending timeouts so skipReveal can cancel them
let revealTimeouts = [];

function startRevealSequence() {
    stopRevealSequence();
    const r = state.room;
    const result = r.roundResults[r.roundResults.length - 1];
    if (!result) return;

    const revealOrder = result.revealOrder || r.submissions.map(s => s.id);
    state.revealIndex = -1;
    state.revealedJokes = [];
    revealTimeouts = [];

    playSound('drumroll');
    render(true);

    // Reveal jokes one by one every 2.5 seconds
    state.revealTimer = setInterval(() => {
        state.revealIndex++;

        const currentId = revealOrder[state.revealIndex];
        const isWinner = state.revealIndex === revealOrder.length - 1;
        const submission = r.submissions.find(s => s.id === currentId);

        // Guard against missing submission
        if (!submission) {
            if (!isWinner) return; // skip bad ID
            // If winner is missing, bail to results
            stopRevealSequence();
            render(true);
            return;
        }

        if (isWinner) {
            // Stop the interval — we handle the rest with timeouts
            clearInterval(state.revealTimer);
            state.revealTimer = null;

            playSound('drumroll');
            // Flash the screen gold
            const flash = document.createElement('div');
            flash.className = 'screen-flash';
            document.body.appendChild(flash);
            revealTimeouts.push(setTimeout(() => flash.remove(), 600));

            // 1.5s dramatic pause, then reveal winner
            revealTimeouts.push(setTimeout(() => {
                if (state.revealPhase !== 'revealing') return; // cancelled
                state.revealedJokes.push({ ...submission, isWinner: true, eliminated: false });
                playSound('reveal');
                createConfetti();
                render(true);

                // After 3s showing winner, transition to full results
                revealTimeouts.push(setTimeout(() => {
                    if (state.revealPhase !== 'revealing') return; // cancelled
                    state.revealPhase = null;
                    state.revealedJokes = [];
                    state.revealIndex = -1;
                    playSound('win');
                    render(true);
                }, 3000));
            }, 1500));
        } else {
            state.revealedJokes.push({ ...submission, isWinner: false, eliminated: true });
            playSound('eliminate');
            render(true);
        }
    }, 2500);
}

function stopRevealSequence() {
    if (state.revealTimer) { clearInterval(state.revealTimer); state.revealTimer = null; }
    revealTimeouts.forEach(t => clearTimeout(t));
    revealTimeouts = [];
    state.revealPhase = null;
    state.revealedJokes = [];
    state.revealIndex = -1;
}

function skipReveal() {
    stopRevealSequence();
    playSound('win');
    render(true);
}

function renderRevealing() {
    if (!state.room) return '';
    const r = state.room;
    const result = r.roundResults[r.roundResults.length - 1];
    if (!result) return '';

    const revealOrder = result.revealOrder || r.submissions.map(s => s.id);
    const totalJokes = revealOrder.length;
    const revealed = state.revealedJokes;
    const current = revealed[revealed.length - 1];
    const isShowingWinner = current?.isWinner;
    const commentary = result.aiCommentary;

    // Crowd reaction meter levels
    const meterLevels = ['Crickets', 'Chuckle', 'Laugh', 'ROFL'];
    const meterIndex = Math.min(revealed.length, meterLevels.length - 1);
    const meterPct = ((revealed.length) / totalJokes) * 100;

    // Aggregate reactions for current joke
    const reactions = r.reactions || [];
    const currentReactions = current ? reactions.filter(rx => rx.submissionId === current.id) : [];
    const emojiCounts = {};
    currentReactions.forEach(rx => { emojiCounts[rx.emoji] = (emojiCounts[rx.emoji] || 0) + 1; });

    return `
        <div class="space-y-4">
            <div class="glow-card p-3 flex justify-between items-center">
                <span class="font-mono text-wit text-xs font-bold tracking-wider">ROUND ${result.round} — REVEAL</span>

            </div>

            <div class="glow-card p-3 text-center">
                <p class="text-gray-400 text-sm">"${esc(r.jokePrompt)}"</p>

function renderVoting() {

            <div class="space-y-3">

                        <div class="flex items-start gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center font-mono font-bold text-sm ${state.votedFor === s.id ? 'bg-oracle text-void' : 'bg-obsidian border border-white/[0.06]'}">${s.id}</div>

            ${state.isHost ? `
                <button onclick="advancePhase()" class="btn btn-ghost w-full py-2 rounded-xl text-xs">SKIP TO RESULTS</button>
            ` : ''}

}

function renderBetting() {
    if (!state.room) return '<div class="space-y-4 py-8"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card" style="height:120px"></div><div class="skeleton skeleton-text" style="width:60%;margin:0 auto"></div></div>';

    const humanBets = r.bets?.filter(b => !r.players.find(p => p.name === b.playerName)?.isBot).length || 0;
    const humanPlayers = r.players.filter(p => !p.isBot).length;

    return `
        <div class="space-y-4">
            ${renderTimer()}
            <div class="glow-card p-3 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="font-mono text-consensus text-xs font-bold tracking-wider">ROUND ${r.currentRound} — BETTING</span>
                    ${r.weeklyTheme ? `<span class="text-[9px] font-mono text-consensus/60 bg-consensus/10 px-1.5 py-0.5 rounded border border-consensus/20">${r.weeklyTheme.emoji} ${r.weeklyTheme.name}</span>` : ''}
                </div>
                <span data-hud="bets" class="text-[10px] font-mono text-gray-500 tracking-wider">${humanBets}/${humanPlayers} BET</span>
            </div>
            <div class="glow-card p-2.5">
                <p class="text-sm text-gray-400 truncate">"${esc(r.jokePrompt)}"</p>
                ${r.promptSource?.type === 'community' ? `<p class="text-[10px] font-mono text-oracle mt-1 tracking-wider">COMMUNITY PROMPT by ${esc(r.promptSource.author)}</p>` : ''}
            </div>

            <p class="text-center text-[10px] font-mono text-red-400/80 tracking-wider">WRONG PREDICTIONS COST YOUR BET</p>
            <div class="space-y-3">
                ${r.submissions.map(s => {
                    const rxForThis = (r.reactions||[]).filter(rx => rx.submissionId === s.id);
                    const emojiCounts = {};
                    rxForThis.forEach(rx => { emojiCounts[rx.emoji] = (emojiCounts[rx.emoji]||0) + 1; });
                    return `
                    <div class="relative">
                        <div onclick="selectSubmission(${s.id})" class="glow-card p-4 cursor-pointer hover:bg-white/[0.03] ${state.selectedSubmission===s.id?'card-selected':''}">
                            <div class="flex items-start gap-3">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center font-mono font-bold text-sm ${state.selectedSubmission===s.id?'bg-wit text-void':'bg-obsidian border border-white/[0.06]'}">${s.id}</div>
                                <p class="flex-1 text-sm">${esc(s.punchline)}</p>
                            </div>
                            ${Object.keys(emojiCounts).length > 0 ? `
                                <div class="flex gap-1 mt-2 ml-12">${Object.entries(emojiCounts).map(([e,c]) => `<span class="text-xs bg-obsidian px-1.5 py-0.5 rounded-full border border-white/[0.04]">${e}${c>1?' x'+c:''}</span>`).join('')}</div>
                            ` : ''}
                        </div>
                        <div class="flex flex-wrap gap-1 mt-1 justify-end">
                            ${['😂','🔥','💀','😐','👏','🤮'].map(e => `
                                <button onclick="event.stopPropagation();sendReaction(${s.id},'${e}')" class="text-base sm:text-lg hover:scale-125 transition-transform ${state.sentReactions >= 3 ? 'opacity-30 pointer-events-none' : ''}" title="React">${e}</button>
                            `).join('')}
                        </div>
                    </div>
                `}).join('')}
            </div>
            ${(() => {
                const budget = r.betBudgets?.[state.playerName] ?? 300;
                const sliderMax = Math.min(100, budget);
                if (state.betAmount > sliderMax) state.betAmount = sliderMax;
                if (state.hasBet) return `
                    <div class="glow-card glow-card-green p-6 text-center">
                        <div class="w-14 h-14 rounded-full bg-consensus/10 border border-consensus/30 flex items-center justify-center mx-auto mb-3">
                            <span class="text-consensus font-mono text-xl">OK</span>
                        </div>
                        <p class="text-consensus font-display font-bold text-lg tracking-wider">BET PLACED</p>
                        <p class="text-gray-500 mt-2 text-xs font-mono tracking-wider">BUDGET: <span class="text-consensus font-bold">${budget} XP</span></p>
                    </div>`;
                if (budget <= 0) return `
                    <div class="glow-card p-6 text-center">
                        <p class="text-gray-500 font-display font-bold tracking-wider">NO BETS REMAINING</p>
                        <p class="text-[10px] font-mono text-gray-600 mt-1 tracking-wider">BUDGET DEPLETED — OBSERVING</p>
                    </div>`;
                return `
                    <div class="glow-card p-4">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-mono text-gray-600 tracking-widest">GAME BUDGET</span>
                            <span class="text-sm font-mono font-bold ${budget <= 50 ? 'text-red-400' : 'text-consensus'}">${budget} XP</span>

                            <span class="text-[10px] font-mono text-gray-500 tracking-wider">BET</span>
                            <input type="range" min="10" max="${sliderMax}" step="10" value="${state.betAmount}" oninput="state.betAmount=+this.value;updateBetDisplay()" class="flex-1">
                            <span id="bet-amount-display" class="text-xl font-mono font-bold text-consensus">${state.betAmount}</span>
                        </div>
                        <button id="bet-submit-btn" onclick="placeBet()" ${!state.selectedSubmission?'disabled':''} class="btn btn-play w-full py-3 rounded-xl font-bold text-sm">BET ON #${state.selectedSubmission||'?'}</button>
                    </div>`;
            })()}
            ${state.isHost && r.bets.length >= 1 ? `
                <button onclick="advancePhase()" class="btn btn-ghost w-full py-2 rounded-xl text-xs">SKIP TO JUDGING</button>
            ` : ''}
        </div>
    `;
}

function renderJudging() {
    // Start the validator voting animation if not already started
    if (!state.validatorVotingStarted) {
        state.validatorVotingStarted = true;
        state.validatorVotes = [];
        state.consensusReached = false;
        startValidatorVoting();
    }

    const validators = [
        { name: 'GPT-4', icon: '🤖', color: 'bg-green-500', taste: 'Loves clever wordplay', thoughts: ['Analyzing wordplay...', 'Checking pun quality...', 'Rating timing...'] },
        { name: 'Claude', icon: '🧠', color: 'bg-purple-500', taste: 'Appreciates dark irony', thoughts: ['Evaluating irony...', 'Detecting layers...', 'Judging subtlety...'] },
        { name: 'LLaMA', icon: '🦙', color: 'bg-blue-500', taste: 'Enjoys absurdist humor', thoughts: ['How absurd is this?', 'Rating chaos...', 'Measuring weird...'] },
        { name: 'Gemini', icon: '💫', color: 'bg-yellow-500', taste: 'Values surprise twists', thoughts: ['Checking twists...', 'Rating shock value...', 'Surprise factor...'] },
        { name: 'Mixtral', icon: '🔮', color: 'bg-pink-500', taste: 'Loves cultural references', thoughts: ['Scanning refs...', 'Rating cultural IQ...', 'Checking depth...'] }
    ];

    const votedCount = state.validatorVotes?.length || 0;
    const consensusReached = state.consensusReached || false;

    // Build vote distribution for bar chart
    const voteDist = {};
    (state.validatorVotes || []).forEach(v => { voteDist[v] = (voteDist[v] || 0) + 1; });
    const maxVotes = Math.max(...Object.values(voteDist), 1);
    const submissions = state.room?.submissions || [];

    return `
        <div class="glow-card p-6 text-center" style="border-radius:20px">
            <div class="w-24 h-24 oracle-eye rounded-full flex items-center justify-center mx-auto mb-4 ${consensusReached ? '' : 'animate-glow processing'}">
                <span class="text-4xl" style="filter:brightness(1.5)">${consensusReached ? '✨' : ''}</span>${!consensusReached ? '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#A855F7" stroke-width="1.5" style="filter:brightness(1.5)"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3" fill="#A855F7" stroke="none"/></svg>' : ''}
            </div>
            <p class="text-[10px] font-mono text-oracle/60 tracking-[0.3em] mb-1">${consensusReached ? 'FINALIZED' : 'PROCESSING'}</p>
            <h2 class="text-2xl font-display font-bold mb-2 tracking-wider">${consensusReached ? 'CONSENSUS REACHED' : 'ORACLE JUDGING'}</h2>
            <p class="text-wit text-xs font-mono mb-1 tracking-wider flex items-center justify-center gap-1.5">${glLogo(14, 'rgb(168,85,247)')} GENLAYER OPTIMISTIC DEMOCRACY</p>
            <p class="text-[10px] font-mono text-gray-600 mb-4 tracking-wider">INDEPENDENT VALIDATORS EVALUATE — CONSENSUS ON-CHAIN</p>

            <div class="glass-bright rounded-xl p-4 mb-4">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-mono text-gray-500 tracking-widest">VALIDATORS</span>
                    <span class="text-xs font-mono font-bold ${votedCount >= 3 ? 'text-green-400' : 'text-consensus'}">${votedCount}/5</span>
                </div>

                <div class="grid grid-cols-3 sm:grid-cols-5 gap-2 mb-4">
                    ${validators.map((v, i) => {
                        const hasVoted = i < votedCount;
                        const isThinking = i === votedCount && !consensusReached;
                        const vote = state.validatorVotes?.[i];
                        const thought = v.thoughts[Math.floor(Math.random() * v.thoughts.length)];
                        return `
                            <div class="flex flex-col items-center relative">
                                ${isThinking ? `
                                    <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-obsidian px-2 py-0.5 rounded-full text-[9px] text-gray-300 whitespace-nowrap animate-pulse border border-white/[0.06]">
                                        ${thought}
                                    </div>
                                ` : ''}
                                <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-full ${hasVoted ? v.color : 'bg-obsidian border border-white/[0.06]'} flex items-center justify-center text-lg sm:text-xl mb-1 transition-all duration-500 ${hasVoted ? 'scale-110 shadow-lg' : isThinking ? 'animate-glow' : 'opacity-50'}">
                                    ${hasVoted ? '✓' : v.icon}
                                </div>
                                <span class="text-[9px] sm:text-[10px] font-mono ${hasVoted ? 'text-white' : 'text-gray-600'}">${v.name}</span>
                                <span class="text-[9px] text-gray-700 hidden sm:block">${v.taste}</span>
                                ${hasVoted && vote ? `<span class="text-[10px] font-mono text-consensus">#${vote}</span>` : ''}
                            </div>
                        `;
                    }).join('')}
                </div>

                <div class="h-1.5 bg-obsidian rounded-full overflow-hidden border border-white/[0.04]">
                    <div class="h-full transition-all duration-500 rounded-full ${votedCount >= 3 ? 'bg-green-500' : 'bg-wit'}"
                         style="width: ${(votedCount / 5) * 100}%"></div>
                </div>
                <p class="text-[10px] font-mono mt-2 tracking-wider ${votedCount >= 3 ? 'text-green-400' : 'text-gray-500'}">
                    ${votedCount >= 3 ? 'MAJORITY CONSENSUS ACHIEVED' : 'AWAITING MAJORITY (3/5)'}
                </p>
            </div>

            ${votedCount > 0 ? `
            <div class="glass-bright rounded-xl p-3 mb-4">
                <p class="text-[10px] font-mono text-gray-600 mb-2 text-left tracking-widest">VOTE DISTRIBUTION</p>
                <div class="space-y-1.5">
                    ${submissions.map((s, idx) => {
                        const sid = s.id || (idx + 1);
                        const count = voteDist[sid] || 0;
                        const pct = votedCount > 0 ? (count / votedCount) * 100 : 0;
                        const isLeading = count === maxVotes && count > 0;
                        return `
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] font-mono text-gray-500 w-6 text-right">#${sid}</span>
                                <div class="flex-1 h-3 bg-obsidian rounded-full overflow-hidden border border-white/[0.04]">
                                    <div class="h-full rounded-full transition-all duration-700 ${isLeading ? 'bg-gradient-to-r from-consensus to-consensus-dim' : 'bg-wit/40'}" style="width:${pct}%"></div>
                                </div>
                                <span class="text-[10px] font-mono ${isLeading ? 'text-consensus font-bold' : 'text-gray-600'} w-6">${count}v</span>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
            ` : ''}

            <div class="glass-bright rounded-xl p-3 text-left max-h-32 overflow-y-auto">
                <p class="text-[10px] font-mono text-gray-600 mb-2 tracking-widest">LIVE VALIDATOR FEED</p>
                <div id="validator-feed" class="space-y-1 text-xs font-mono">
                    ${state.validatorVotes?.map((vote, i) => `
                        <div class="flex items-center gap-2 text-gray-400 animate-fadeIn">
                            <span class="text-green-400">OK</span>
                            <span>${validators[i].name} → #${vote}</span>
                        </div>
                    `).join('') || '<div class="text-gray-600">Initializing validators...</div>'}
                    ${consensusReached ? `
                        <div class="flex items-center gap-2 text-green-400 font-bold mt-2 animate-fadeIn tracking-wider">
                            <span>TX</span>
                            <span>CONSENSUS — RECORDING ON-CHAIN</span>
                        </div>
                    ` : ''}
                </div>
            </div>

            ${consensusReached ? `
            <div class="mt-4 glass-bright rounded-xl p-3 animate-scaleIn">
                <div class="flex items-center justify-center gap-3">
                    <div class="flex items-center gap-1">
                        <div class="w-3 h-3 rounded-sm bg-wit animate-pulse"></div>
                        <div class="w-6 h-0.5 bg-wit/50"></div>
                        <div class="w-3 h-3 rounded-sm bg-wit animate-pulse" style="animation-delay:0.2s"></div>
                        <div class="w-6 h-0.5 bg-green-500/50"></div>
                        <div class="w-3 h-3 rounded-sm bg-green-500 animate-pulse" style="animation-delay:0.4s"></div>
                    </div>
                </div>
                <p class="text-[10px] font-mono text-green-400 mt-1.5 text-center tracking-wider flex items-center justify-center gap-1">${glLogo(11, 'rgb(34,197,94)')} BLOCK CONFIRMED &middot; TX FINALIZED ON GENLAYER</p>

            ` : `
            <div class="mt-4 flex items-center justify-center gap-2 text-[10px] font-mono text-gray-600 tracking-wider">
