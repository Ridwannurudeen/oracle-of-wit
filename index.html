<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle of Wit - GenLayer Community Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Space Grotesk', sans-serif; box-sizing: border-box; }
        body { background: #070b14; }
        /* Glass cards with subtle glow */
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; }
        .glass-bright { background: rgba(255,255,255,0.06); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        /* Gradient border cards */
        .glow-card { position: relative; background: rgba(15,20,35,0.9); border-radius: 16px; overflow: hidden; }
        .glow-card::before { content:''; position:absolute; inset:-1px; border-radius:17px; padding:1px; background:linear-gradient(135deg,rgba(168,85,247,0.4),rgba(236,72,153,0.2),rgba(99,102,241,0.4)); -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events:none; }
        .glow-card-gold::before { background:linear-gradient(135deg,rgba(245,158,11,0.6),rgba(234,88,12,0.3),rgba(245,158,11,0.6)); }
        .glow-card-red::before { background:linear-gradient(135deg,rgba(239,68,68,0.5),rgba(185,28,28,0.3),rgba(239,68,68,0.5)); }
        .glow-card-cyan::before { background:linear-gradient(135deg,rgba(34,211,238,0.4),rgba(6,182,212,0.2),rgba(34,211,238,0.4)); }
        .glow-card-green::before { background:linear-gradient(135deg,rgba(34,197,94,0.5),rgba(22,163,74,0.2),rgba(34,197,94,0.5)); }
        .glow-card-amber::before { background:linear-gradient(135deg,rgba(245,158,11,0.4),rgba(234,88,12,0.2),rgba(245,158,11,0.4)); }
        .gradient-text { background: linear-gradient(135deg, #f59e0b, #ec4899, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .gradient-text-blue { background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .oracle-eye { background: radial-gradient(circle at 30% 30%, #a855f7, #6366f1, #1e1b4b); box-shadow: 0 0 80px rgba(168,85,247,0.4), 0 0 160px rgba(139,92,246,0.15); }
        /* Neon button styles */
        .btn { transition: all 0.2s; cursor: pointer; font-weight: 600; }
        .btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.15); }
        .btn:active:not(:disabled) { transform: translateY(0); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: linear-gradient(135deg, #7c3aed, #db2777); box-shadow: 0 4px 20px rgba(124,58,237,0.3); }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 30px rgba(124,58,237,0.5); }
        .btn-play { background: linear-gradient(135deg, #f59e0b, #ea580c); box-shadow: 0 4px 20px rgba(245,158,11,0.3); }
        .btn-play:hover:not(:disabled) { box-shadow: 0 6px 30px rgba(245,158,11,0.5); }
        .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
        /* Category pill buttons */
        .cat-btn { position:relative; overflow:hidden; transition:all 0.3s; }
        .cat-btn::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,0.1) 0%,transparent 50%); pointer-events:none; border-radius:inherit; }
        .cat-btn:hover { transform:translateY(-3px); box-shadow:0 8px 25px rgba(0,0,0,0.3); }
        .card-selected { background: rgba(139,92,246,0.25) !important; border: 2px solid #a855f7 !important; box-shadow: 0 0 30px rgba(139,92,246,0.2); }
        .spinner { border: 3px solid rgba(255,255,255,0.08); border-top-color: #a855f7; border-radius: 50%; animation: spin 1s linear infinite; width: 24px; height: 24px; }
        /* Animations */
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 20px rgba(139,92,246,0.5); } 50% { box-shadow: 0 0 60px rgba(139,92,246,0.9); } }
        .animate-glow { animation: pulse-glow 2s ease-in-out infinite; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.5s ease-in-out; }
        @keyframes countdown-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .countdown-critical { animation: countdown-pulse 0.5s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .confetti { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 1000; }
        @keyframes confetti-fall { 0% { transform: translateY(-100vh) rotate(0deg); opacity:1; } 100% { transform: translateY(100vh) rotate(720deg); opacity:0; } }
        .timer-bar { transition: width 0.5s linear; }
        textarea, input[type="text"] { background: rgba(15,20,35,0.8) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; }
        textarea:focus, input[type="text"]:focus { border-color: rgba(139,92,246,0.5) !important; box-shadow: 0 0 20px rgba(139,92,246,0.15); }
        .rotate-180 { transform: rotate(180deg); }
        .transition-transform { transition: transform 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-slideIn { animation: slideInRight 0.5s ease-out; }
        @keyframes slideOutLeft { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-100%); opacity: 0; } }
        .animate-slideOut { animation: slideOutLeft 0.4s ease-in forwards; }
        @keyframes goldPulse { 0%,100% { box-shadow: 0 0 20px rgba(245,158,11,0.5); } 50% { box-shadow: 0 0 80px rgba(245,158,11,0.9); } }
        .animate-goldPulse { animation: goldPulse 1s ease-in-out infinite; }
        @keyframes winnerScale { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .animate-winnerScale { animation: winnerScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes screenFlash { 0% { opacity: 0; } 30% { opacity: 0.3; } 100% { opacity: 0; } }
        .screen-flash { animation: screenFlash 0.6s ease-out; position: fixed; inset: 0; background: gold; pointer-events: none; z-index: 999; }
        @keyframes meterFill { from { width: 0%; } to { width: var(--fill-pct); } }
        .meter-fill { animation: meterFill 1.5s ease-out forwards; }
        @keyframes typewriter { from { width: 0; } to { width: 100%; } }
        .typewriter { overflow: hidden; white-space: nowrap; animation: typewriter 1s steps(40) forwards; display: inline-block; max-width: 100%; }
        @keyframes emojiFloat { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-60px) scale(1.3); opacity: 0; } }
        .emoji-float { position: absolute; animation: emojiFloat 2s ease-out forwards; pointer-events: none; font-size: 1.5rem; }
        @keyframes screenShake { 0%,100% { transform: translateX(0); } 10% { transform: translateX(-8px) rotate(-1deg); } 30% { transform: translateX(8px) rotate(1deg); } 50% { transform: translateX(-5px); } 70% { transform: translateX(5px); } }
        .animate-screenShake { animation: screenShake 0.6s ease-in-out; }
        @keyframes comebackBanner { 0% { transform: scale(0) rotate(-10deg); opacity: 0; } 50% { transform: scale(1.2) rotate(3deg); } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
        .animate-comeback { animation: comebackBanner 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .streak-fire { text-shadow: 0 0 10px #f59e0b, 0 0 20px #ef4444; }
        @keyframes toastIn { from { transform: translateY(-100%) scale(0.8); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-20px); } }
        .toast-in { animation: toastIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .toast-out { animation: toastOut 0.4s ease-in forwards; }
        .xp-bar { background: linear-gradient(90deg, #7c3aed, #db2777, #f59e0b); transition: width 1s ease-out; border-radius: 999px; }
        @keyframes countUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-count { animation: countUp 0.5s ease-out backwards; }
        /* Background grid effect */
        .bg-grid { background-image: linear-gradient(rgba(139,92,246,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(139,92,246,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,0.5); }
        /* Tab styles */
        .tab-active { background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(219,39,119,0.15)); border-bottom: 2px solid #a855f7; }
        .tab-inactive { background: transparent; border-bottom: 2px solid transparent; }
        .tab-inactive:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen text-white bg-grid">
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
        <div class="absolute top-1/4 -left-20 w-96 h-96 bg-purple-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-pink-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute top-3/4 left-1/3 w-64 h-64 bg-indigo-600/8 rounded-full blur-[100px]"></div>
    </div>
    <div id="app"></div>

<script>
const API_URL = '/api/game';
const BASE_POLL_INTERVAL = 1500;

// Prevent XSS from user-supplied content
function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
}
let currentPollInterval = BASE_POLL_INTERVAL;
let soundEnabled = true;
let audioCtx = null;
let isTyping = false; // Track if user is typing
let typingTimeout = null;

// Dynamic polling - slower for larger rooms to reduce server load
function getPollInterval() {
    const playerCount = state.room?.players?.length || 0;
    if (playerCount > 50) return 3000;  // 3s for 50+ players
    if (playerCount > 20) return 2500;  // 2.5s for 20-50 players
    if (playerCount > 10) return 2000;  // 2s for 10-20 players
    return BASE_POLL_INTERVAL;          // 1.5s for small rooms
}

// Mark user as typing (prevents full re-renders)
function setTyping() {
    isTyping = true;
    if (typingTimeout) clearTimeout(typingTimeout);
    // Keep typing flag active for 3 seconds after last keystroke
    typingTimeout = setTimeout(() => { isTyping = false; }, 3000);
}

// Update ONLY the timer display without re-rendering everything
function updateTimerDisplay() {
    const timerEl = document.getElementById('timer-display');
    const timerBar = document.getElementById('timer-bar');
    const timerWarning = document.getElementById('timer-warning');
    
    if (timerEl) {
        const isLow = state.timeLeft <= 10;
        timerEl.textContent = formatTime(state.timeLeft);
        timerEl.className = `text-3xl font-bold ${isLow ? 'countdown-critical text-red-500' : ''}`;
    }
    if (timerBar) {
        const max = state.screen === 'submitting' ? 40 : 30;
        const pct = (state.timeLeft / max) * 100;
        const isLow = state.timeLeft <= 10;
        timerBar.style.width = `${pct}%`;
        timerBar.className = `h-full timer-bar rounded-full ${isLow ? 'bg-red-500' : 'bg-gradient-to-r from-purple-500 to-pink-500'}`;
    }
    if (timerWarning) {
        timerWarning.style.display = state.timeLeft <= 10 ? 'block' : 'none';
    }
}

// Update character count without re-rendering
function updateCharCount() {
    const charCount = document.getElementById('char-count');
    if (charCount) {
        charCount.textContent = `${state.punchlineText.length}/200`;
    }
}

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    if (!soundEnabled || !audioCtx) return;
    const sounds = {
        click: [600, 0.1, 'sine'],
        submit: [800, 0.15, 'sine'],
        bet: [500, 0.2, 'triangle'],
        win: [[523,659,784], 0.3, 'sine'],
        tick: [1000, 0.05, 'square'],
        start: [[440,554,659], 0.2, 'sine'],
        warning: [[440,220], 0.3, 'sawtooth'],
        eliminate: [[400,200], 0.1, 'sine'],
        reveal: [[523,659,784,1047], 0.4, 'sine'],
        loss: [150, 0.2, 'sawtooth'],
        drumroll: null, // special handling below
        streak: [[660,880,1100], 0.3, 'sine']
    };
    // Drumroll: ascending sweep
    if (type === 'drumroll') {
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.6);
        } catch(e) {}
        return;
    }
    const s = sounds[type];
    if (!s) return;
    try {
        const freqs = Array.isArray(s[0]) ? s[0] : [s[0]];
        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = f; osc.type = s[2];
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + s[1]);
            osc.start(audioCtx.currentTime + i * 0.1);
            osc.stop(audioCtx.currentTime + s[1] + i * 0.1);
        });
    } catch(e) {}
}

let state = {
    screen: 'welcome',
    playerName: localStorage.getItem('playerName') || '',
    roomId: null,
    room: null,
    isHost: false,
    selectedSubmission: null,
    betAmount: 50,
    hasSubmitted: false,
    hasBet: false,
    error: null,
    loading: false,
    leaderboard: [],
    publicRooms: [],
    timeLeft: 0,
    punchlineText: '',
    showHelp: false,
    // Validator voting animation state
    validatorVotingStarted: false,
    validatorVotes: [],
    consensusReached: false,
    winningSubmissionId: null,
    // Weekly theme
    currentWeeklyTheme: null,
    // Reveal sequence state
    revealPhase: null,       // 'revealing' | 'winner' | null
    revealIndex: -1,         // which joke we're showing
    revealTimer: null,       // interval ref
    revealedJokes: [],       // jokes revealed so far
    // Emoji reactions
    sentReactions: 0,
    floatingEmojis: [],
    // Player profile
    playerId: localStorage.getItem('playerId') || null,
    profile: null,
    allAchievements: [],
    nextLevelXP: null,
    // Daily challenge
    dailyChallenge: null,
    dailyResult: null,
    dailySubmitting: false,
    // Hall of fame
    hallOfFame: [],
    showHallOfFame: false,
    // Friend challenge
    challengeData: null,
    challengeResult: null,
    // Appeal
    appealInProgress: false,
    appealResult: null,
    // Spectator
    isSpectator: false,
    // Seasonal leaderboard
    currentSeason: null,
    seasonalLeaderboard: [],
    availableSeasons: [],
    selectedSeason: null,
    // Community prompts
    communityPrompts: [],
    showCommunityPrompts: false,
    // Tournament
    tournament: null,
    tournaments: [],
    showTournaments: false
};

let pollInterval = null;
let timerInterval = null;
let renderPending = false;
let lastRenderTime = 0;
const MIN_RENDER_INTERVAL = 100; // Minimum ms between renders

function syncTimer() {
    if (!state.room?.phaseEndsAt) { state.timeLeft = 0; return; }
    state.timeLeft = Math.max(0, Math.floor((state.room.phaseEndsAt - Date.now()) / 1000));
}

function startTimer() {
    stopTimer();
    timerInterval = setInterval(() => {
        if (state.timeLeft > 0) {
            state.timeLeft--;
            if (state.timeLeft <= 5 && state.timeLeft > 0) playSound('tick');
            if (state.timeLeft === 10) playSound('warning');
            // ALWAYS use targeted update - NEVER full render from timer
            updateTimerDisplay();
        }
    }, 1000);
}

function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function formatTime(s) {
    return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

async function api(action, data = {}) {
    state.loading = true;
    state.error = null;
    // Don't render during loading if user is typing
    if (!isTyping) render();
    try {
        const res = await fetch(`${API_URL}?action=${action}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        state.loading = false;
        if (!res.ok || result.error) throw new Error(result.error || 'Error');
        return result;
    } catch (e) {
        state.loading = false;
        state.error = e.message;
        render(true); // Force render to show error
        throw e;
    }
}

async function fetchRoom() {
    if (!state.roomId) return;
    try {
        const res = await fetch(`${API_URL}?action=getRoom&roomId=${state.roomId}`);
        const result = await res.json();
        if (result.success && result.room) {
            const oldStatus = state.room?.status;
            const oldSubmissionCount = state.room?.submissions?.length || 0;
            const oldBetCount = state.room?.bets?.length || 0;
            const oldPlayerCount = state.room?.players?.length || 0;
            
            state.room = result.room;
            syncTimer();
            
            // Only render if status changed
            if (state.room.status !== oldStatus) {
                handlePhaseChange(oldStatus, state.room.status);
                render(true); // Force render on phase change
                return;
            }
            
            // Check if something important changed
            const newSubmissionCount = state.room?.submissions?.length || 0;
            const newBetCount = state.room?.bets?.length || 0;
            const newPlayerCount = state.room?.players?.length || 0;
            
            const hasImportantChange = 
                newSubmissionCount !== oldSubmissionCount ||
                newBetCount !== oldBetCount ||
                newPlayerCount !== oldPlayerCount;
            
            // Only render if something important changed AND user is not typing
            if (hasImportantChange && !isTyping) {
                render();
            }
            // Always update timer display
            updateTimerDisplay();
        }
    } catch (e) {}
}

function handlePhaseChange(oldStatus, newStatus) {
    // Always clean up reveal state on any phase transition
    stopRevealSequence();
    // Reset typing flag on phase change
    isTyping = false;
    if (typingTimeout) clearTimeout(typingTimeout);

    state.screen = newStatus === 'roundResults' ? 'roundResults' : newStatus;
    if (newStatus === 'submitting') {
        playSound('start');
        state.hasSubmitted = false;
        state.punchlineText = '';
        // Reset validator voting state for new round
        state.validatorVotingStarted = false;
        state.validatorVotes = [];
        state.consensusReached = false;
        state.winningSubmissionId = null;
        state.sentReactions = 0;
        syncTimer();
        startTimer();
    } else if (newStatus === 'betting') {
        playSound('click');
        state.hasBet = false;
        state.selectedSubmission = null;
        state.sentReactions = 0;
        syncTimer();
        startTimer();
    } else if (newStatus === 'roundResults') {
        stopTimer();
        stopValidatorVoting();
        generateFinalValidatorVotes();
        // Start dramatic reveal instead of jumping to results
        state.revealPhase = 'revealing';
        state.revealIndex = -1;
        state.revealedJokes = [];
        state.sentReactions = 0;
        startRevealSequence();
    } else if (newStatus === 'finished') {
        stopTimer();
        stopPolling();
        stopValidatorVoting();
        playSound('win');
        createConfetti();
    } else if (newStatus === 'judging') {
        stopTimer();
        // Reset for new judging phase
        state.validatorVotingStarted = false;
        state.validatorVotes = [];
        state.consensusReached = false;
    }
}

// Generate validator votes based on actual round result
function generateFinalValidatorVotes() {
    const result = state.room?.roundResults?.[state.room.roundResults.length - 1];
    if (!result) return;
    
    const winnerId = result.winnerId;
    const submissions = state.room?.submissions || [];
    const otherIds = submissions.map(s => s.id).filter(id => id !== winnerId);
    
    // Generate 5 validator votes - majority (4-5) agree on winner
    state.validatorVotes = [];
    for (let i = 0; i < 5; i++) {
        // 4 validators agree, 1 might disagree (to show democracy)
        if (i < 4 || Math.random() > 0.5) {
            state.validatorVotes.push(winnerId);
        } else if (otherIds.length > 0) {
            // One validator disagrees
            state.validatorVotes.push(otherIds[Math.floor(Math.random() * otherIds.length)]);
        } else {
            state.validatorVotes.push(winnerId);
        }
    }
    state.consensusReached = true;
    state.winningSubmissionId = winnerId;
}

async function fetchLeaderboard() {
    try {
        const res = await fetch(`${API_URL}?action=getLeaderboard`);
        const result = await res.json();
        if (result.success) state.leaderboard = result.leaderboard || [];
    } catch (e) {}
}

async function fetchPublicRooms() {
    try {
        const res = await fetch(`${API_URL}?action=listRooms`);
        const result = await res.json();
        if (result.success) { state.publicRooms = result.rooms || []; render(); }
    } catch (e) {}
}

function startPolling() {
    stopPolling();
    fetchRoom();
    scheduleNextPoll();
}

function scheduleNextPoll() {
    currentPollInterval = getPollInterval();
    pollInterval = setTimeout(() => {
        fetchRoom();
        if (state.roomId) {
            scheduleNextPoll(); // Recursively schedule with updated interval
        }
    }, currentPollInterval);
}

function stopPolling() {
    if (pollInterval) { 
        clearTimeout(pollInterval); 
        pollInterval = null; 
    }
}

async function createRoom(category, singlePlayer = false) {
    initAudio();
    playSound('click');
    try {
        const result = await api('createRoom', { hostName: state.playerName, category, singlePlayer });
        state.roomId = result.roomId;
        state.room = result.room;
        state.isHost = true;
        state.screen = 'waiting';
        localStorage.setItem('playerName', state.playerName);
        startPolling();
        render();
    } catch (e) {}
}

async function joinRoom(roomId) {
    if (!roomId?.trim()) { state.error = 'Enter room code'; render(); return; }
    initAudio();
    playSound('click');
    try {
        const result = await api('joinRoom', { roomId: roomId.toUpperCase(), playerName: state.playerName });
        state.roomId = roomId.toUpperCase();
        state.room = result.room;
        state.isHost = state.room.host === state.playerName;
        state.screen = 'waiting';
        localStorage.setItem('playerName', state.playerName);
        startPolling();
        render();
    } catch (e) {}
}

async function startGame() {
    playSound('start');
    try {
        const result = await api('startGame', { roomId: state.roomId, hostName: state.playerName });
        state.room = result.room;
        state.screen = 'submitting';
        state.hasSubmitted = false;
        state.punchlineText = '';
        syncTimer();
        startTimer();
        render();
    } catch (e) {}
}

async function submitPunchline() {
    const text = state.punchlineText.trim();
    if (!text) { state.error = 'Write a punchline first'; render(true); return; }
    // Reset typing flag since user is done typing
    isTyping = false;
    if (typingTimeout) clearTimeout(typingTimeout);
    playSound('submit');
    try {
        await api('submitPunchline', { roomId: state.roomId, playerName: state.playerName, punchline: text });
        state.hasSubmitted = true;
        render(true); // Force render after submission
    } catch (e) {}
}

async function placeBet() {
    if (!state.selectedSubmission) { state.error = 'Select a submission first'; render(); return; }
    playSound('bet');
    try {
        await api('placeBet', { roomId: state.roomId, playerName: state.playerName, submissionId: state.selectedSubmission, amount: state.betAmount });
        state.hasBet = true;
        render();
    } catch (e) {}
}

async function sendReaction(submissionId, emoji) {
    if (state.sentReactions >= 3) return;
    try {
        await api('sendReaction', { roomId: state.roomId, playerName: state.playerName, submissionId, emoji });
        state.sentReactions++;
        render();
    } catch (e) {}
}

async function advancePhase() {
    playSound('click');
    try {
        const result = await api('advancePhase', { roomId: state.roomId, hostName: state.playerName });
        state.room = result.room;
        render();
    } catch (e) {}
}

async function nextRound() {
    playSound('click');
    try {
        const result = await api('nextRound', { roomId: state.roomId, hostName: state.playerName, playerId: state.playerId });
        state.room = result.room;
        if (result.room.status === 'finished') {
            state.screen = 'finished';
            state.leaderboard = result.leaderboard || [];
            if (result.profileUpdate) {
                state.profile = result.profileUpdate.profile;
                state.nextLevelXP = getNextLevelXPClient(state.profile.lifetimeXP);
                if (result.profileUpdate.newAchievements?.length > 0) {
                    result.profileUpdate.newAchievements.forEach(a => showAchievementToast(a));
                }
            }
            stopPolling();
            stopTimer();
            playSound('win');
            createConfetti();
        } else {
            state.screen = 'submitting';
            state.hasSubmitted = false;
            state.punchlineText = '';
            state.appealResult = null;
            state.appealInProgress = false;
            playSound('start');
            syncTimer();
            startTimer();
        }
        render();
    } catch (e) {}
}

function leaveRoom() {
    playSound('click');
    stopPolling();
    stopTimer();
    state.roomId = null;
    state.room = null;
    state.isHost = false;
    state.hasSubmitted = false;
    state.hasBet = false;
    state.punchlineText = '';
    state.appealInProgress = false;
    state.appealResult = null;
    state.isSpectator = false;
    state.tournament = null;
    state.screen = 'lobby';
    fetchPublicRooms();
    fetchProfile();
    render();
}

    state.dailySubmitting = true;
    render(true);

            state.dailyResult = result.result;

            if (result.result.newAchievements?.length > 0) {
                result.result.newAchievements.forEach(a => showAchievementToast(a));

            render(true);

async function appealVerdict() {
    if (state.appealInProgress || state.appealResult) return;
    state.appealInProgress = true;
    render(true);
    try {
        const res = await fetch(`${API_URL}?action=appealVerdict`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomId: state.roomId, playerName: state.playerName, playerId: state.playerId })
        });
        const result = await res.json();
        state.appealInProgress = false;
        if (result.success) {
            state.appealResult = result.appeal;
            state.room = result.room;
            if (result.appeal.overturned) playSound('reveal');
            else playSound('loss');
            render(true);
        } else {
            state.error = result.error; render(true);
        }
    } catch(e) { state.appealInProgress = false; state.error = e.message; render(true); }
}

function showAchievementToast(achievementId) {
    const a = state.allAchievements.find(x => x.id === achievementId);
    if (!a) return;
    const toast = document.createElement('div');
    toast.className = 'fixed top-20 left-1/2 -translate-x-1/2 z-[1000] glass rounded-xl px-6 py-3 border border-yellow-500/50 text-center toast-in';
    toast.innerHTML = `<p class="text-yellow-400 font-bold text-sm">Achievement Unlocked!</p><p class="text-xl">${a.icon} ${a.name}</p>`;
    document.body.appendChild(toast);
    setTimeout(() => { toast.classList.add('toast-out'); setTimeout(() => toast.remove(), 500); }, 3000);
}

// Share card generation (Canvas API)
function generateShareCard(prompt, punchline, playerName, score, roast) {
    const canvas = document.createElement('canvas');
    canvas.width = 600; canvas.height = 400;
    const ctx = canvas.getContext('2d');

    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, 600, 400);
    grad.addColorStop(0, '#1e1b4b'); grad.addColorStop(0.5, '#312e81'); grad.addColorStop(1, '#4c1d95');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 600, 400);

    // Border
    ctx.strokeStyle = 'rgba(168,85,247,0.5)'; ctx.lineWidth = 2;
    ctx.strokeRect(10, 10, 580, 380);

    // Title
    ctx.fillStyle = '#f59e0b'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Oracle of Wit', 300, 45);
    ctx.fillStyle = '#a855f7'; ctx.font = '12px sans-serif';
    ctx.fillText('Powered by GenLayer', 300, 62);

    // Prompt
    ctx.fillStyle = '#94a3b8'; ctx.font = '14px sans-serif';
    wrapText(ctx, `"${prompt}"`, 300, 95, 520, 18);

    // Winning punchline
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 18px sans-serif';
    const punchY = wrapText(ctx, `"${punchline}"`, 300, 150, 520, 22);

    // Author
    ctx.fillStyle = '#fbbf24'; ctx.font = '14px sans-serif';
    ctx.fillText(`by ${playerName}`, 300, punchY + 25);

    // Roast
    if (roast) {
        ctx.fillStyle = '#94a3b8'; ctx.font = 'italic 13px sans-serif';
        wrapText(ctx, roast, 300, punchY + 55, 520, 17);
    }

    // Score
    ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 28px sans-serif';
    ctx.fillText(`${score} XP`, 300, 340);

    // CTA
    ctx.fillStyle = '#6366f1'; ctx.font = '12px sans-serif';
    ctx.fillText('oracle-of-wit.vercel.app', 300, 375);

    return canvas;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '', curY = y;
    for (const word of words) {
        const test = line + word + ' ';
        if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line.trim(), x, curY);
            line = word + ' '; curY += lineHeight;
        } else { line = test; }
    }
    ctx.fillText(line.trim(), x, curY);
    return curY;
}

function shareImage(prompt, punchline, playerName, score, roast) {
    const canvas = generateShareCard(prompt, punchline, playerName, score, roast);
    canvas.toBlob(blob => {
        if (navigator.share && navigator.canShare?.({ files: [new File([blob], 'oracle-of-wit.png', { type: 'image/png' })] })) {
            navigator.share({
                title: 'Oracle of Wit',
                text: `I scored ${score} XP on Oracle of Wit!`,
                files: [new File([blob], 'oracle-of-wit.png', { type: 'image/png' })]
            }).catch(() => {});
        } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'oracle-of-wit.png';
            a.click(); URL.revokeObjectURL(url);
        }
    }, 'image/png');
}

// Validator voting animation for Optimistic Democracy visualization
let validatorVotingInterval = null;

function startValidatorVoting() {
    if (validatorVotingInterval) return; // Already running
    
    state.validatorVotes = [];
    state.consensusReached = false;
    
    // Get submissions to simulate voting on
    const submissions = state.room?.submissions || [];
    const submissionIds = submissions.map(s => s.id);
    
    if (submissionIds.length === 0) return;
    
    // Determine the likely winner (first submission for simulation, 
    // actual winner comes from backend)
    let winningId = submissionIds[0];
    
    // Simulate validators voting one by one
    let voteIndex = 0;
    const validators = ['GPT-4', 'Claude', 'LLaMA', 'Gemini', 'Mixtral'];
    
    validatorVotingInterval = setInterval(() => {
        if (voteIndex >= 5) {
            // All validators voted
            state.consensusReached = true;
            playSound('click');
            render(true);
            stopValidatorVoting();
            return;
        }
        
        // Simulate validator voting
        // Most validators agree (4-5 out of 5) to show consensus
        let vote;
        if (voteIndex < 4 || Math.random() > 0.3) {
            vote = winningId; // Agree with consensus
        } else {
            // Occasionally a validator disagrees (shows democracy working)
            const otherIds = submissionIds.filter(id => id !== winningId);
            vote = otherIds.length > 0 ? otherIds[Math.floor(Math.random() * otherIds.length)] : winningId;
        }
        
        state.validatorVotes.push(vote);
        playSound('tick');
        
        // Check for majority (3/5)
        const voteCounts = {};
        state.validatorVotes.forEach(v => {
            voteCounts[v] = (voteCounts[v] || 0) + 1;
        });
        const maxVotes = Math.max(...Object.values(voteCounts));
        if (maxVotes >= 3 && !state.consensusReached) {
            // Find the winning submission ID
            state.winningSubmissionId = Object.keys(voteCounts).find(k => voteCounts[k] === maxVotes);
        }
        
        voteIndex++;
        render(true);
        
    }, 800); // Vote every 800ms for dramatic effect
}

function stopValidatorVoting() {
    if (validatorVotingInterval) {
        clearInterval(validatorVotingInterval);
        validatorVotingInterval = null;
    }
}

function render(force = false) {
    // Skip render completely while typing (unless forced)
    if (isTyping && !force) {
        updateTimerDisplay();
        return;
    }
    
    // Throttle renders to prevent freezing
    const now = Date.now();
    if (now - lastRenderTime < MIN_RENDER_INTERVAL && !force) {
        if (!renderPending) {
            renderPending = true;
            setTimeout(() => {
                renderPending = false;
                render();
            }, MIN_RENDER_INTERVAL);
        }
        return;
    }
    lastRenderTime = now;
    
    // Preserve textarea focus and cursor position
    const activeEl = document.activeElement;
    const wasTextareaFocused = activeEl && activeEl.id === 'punchline';
    let selectionStart = 0, selectionEnd = 0;
    if (wasTextareaFocused) {
        selectionStart = activeEl.selectionStart;
        selectionEnd = activeEl.selectionEnd;
    }
    
    document.getElementById('app').innerHTML = `
        <header class="py-3 px-4 border-b border-white/5 sticky top-0 z-50" style="background:rgba(7,11,20,0.92);backdrop-filter:blur(16px)">

                <div class="flex items-center gap-2.5">
                    <span class="text-2xl">🎭</span>
                    <div>
                        <h1 class="text-lg font-bold gradient-text leading-tight">Oracle of Wit</h1>
                        <p class="text-[10px] text-gray-500 tracking-wide">GENLAYER GAME</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="toggleSound()" class="btn btn-ghost p-2 rounded-lg text-lg">${soundEnabled ? '🔊' : '🔇'}</button>
                    ${state.profile ? `<span class="px-2.5 py-1 bg-purple-600/20 border border-purple-500/20 rounded-lg text-sm font-medium">Lv.${state.profile.level} <span class="text-purple-400">${esc(state.profile.title)}</span></span>` : state.playerName ? `<span class="px-2.5 py-1 bg-purple-600/20 border border-purple-500/20 rounded-lg text-sm">${esc(state.playerName)}</span>` : ''}

                </div>

    }
}

function renderTimer() {
    if (state.timeLeft <= 0) return '';
    const isLow = state.timeLeft <= 10;
    const max = state.screen === 'submitting' ? 40 : 30;
    const pct = (state.timeLeft / max) * 100;
    return `
        <div class="glow-card ${isLow ? 'glow-card-red' : ''} p-4 mb-4">
            <div class="flex justify-between items-center mb-2">
                <span class="text-gray-400">⏱️ Time</span>
                <span id="timer-display" class="text-3xl font-bold ${isLow ? 'countdown-critical text-red-500' : ''}">${formatTime(state.timeLeft)}</span>
            </div>
            <div class="h-3 bg-slate-800 rounded-full overflow-hidden">
                <div id="timer-bar" class="h-full timer-bar rounded-full ${isLow ? 'bg-red-500' : 'bg-gradient-to-r from-purple-500 to-pink-500'}" style="width:${pct}%"></div>
            </div>
            <p id="timer-warning" class="text-red-400 text-sm mt-2 text-center animate-pulse" style="display:${isLow ? 'block' : 'none'}">⚡ Hurry!</p>
        </div>
    `;
}

function renderScreen() {
    // Spectator intercepts all game screens
    if (state.isSpectator && state.room) return renderSpectating();
    // Reveal phase intercepts roundResults
    if (state.revealPhase === 'revealing') return renderRevealing();
    switch (state.screen) {
        case 'welcome': return renderWelcome();
        case 'lobby': return renderLobby();
        case 'waiting': return renderWaiting();
        case 'submitting': return renderSubmitting();
        case 'betting': return renderBetting();
        case 'judging': return renderJudging();
        case 'roundResults': return renderRoundResults();
        case 'finished': return renderFinalResults();
        case 'daily': return renderDailyChallenge();
        case 'profile': return renderProfileScreen();
        case 'hallOfFame': return renderHallOfFame();
        case 'tournament': return renderTournament();
        case 'communityPrompts': return renderCommunityPrompts();
        case 'seasons': return renderSeasons();
        default: return renderWelcome();
    }
}

// === DRAMATIC REVEAL SEQUENCE ===
// Track pending timeouts so skipReveal can cancel them
let revealTimeouts = [];

function startRevealSequence() {
    stopRevealSequence();
    const r = state.room;
    const result = r.roundResults[r.roundResults.length - 1];
    if (!result) return;

    const revealOrder = result.revealOrder || r.submissions.map(s => s.id);
    state.revealIndex = -1;
    state.revealedJokes = [];
    revealTimeouts = [];

    playSound('drumroll');
    render(true);

    // Reveal jokes one by one every 2.5 seconds
    state.revealTimer = setInterval(() => {
        state.revealIndex++;

        const currentId = revealOrder[state.revealIndex];
        const isWinner = state.revealIndex === revealOrder.length - 1;
        const submission = r.submissions.find(s => s.id === currentId);

        // Guard against missing submission
        if (!submission) {
            if (!isWinner) return; // skip bad ID
            // If winner is missing, bail to results
            stopRevealSequence();
            render(true);
            return;
        }

        if (isWinner) {
            // Stop the interval — we handle the rest with timeouts
            clearInterval(state.revealTimer);
            state.revealTimer = null;

            playSound('drumroll');
            // Flash the screen gold
            const flash = document.createElement('div');
            flash.className = 'screen-flash';
            document.body.appendChild(flash);
            revealTimeouts.push(setTimeout(() => flash.remove(), 600));

            // 1.5s dramatic pause, then reveal winner
            revealTimeouts.push(setTimeout(() => {
                if (state.revealPhase !== 'revealing') return; // cancelled
                state.revealedJokes.push({ ...submission, isWinner: true, eliminated: false });
                playSound('reveal');
                createConfetti();
                render(true);

                // After 3s showing winner, transition to full results
                revealTimeouts.push(setTimeout(() => {
                    if (state.revealPhase !== 'revealing') return; // cancelled
                    state.revealPhase = null;
                    state.revealedJokes = [];
                    state.revealIndex = -1;
                    playSound('win');
                    render(true);
                }, 3000));
            }, 1500));
        } else {
            state.revealedJokes.push({ ...submission, isWinner: false, eliminated: true });
            playSound('eliminate');
            render(true);
        }
    }, 2500);
}

function stopRevealSequence() {
    if (state.revealTimer) { clearInterval(state.revealTimer); state.revealTimer = null; }
    revealTimeouts.forEach(t => clearTimeout(t));
    revealTimeouts = [];
    state.revealPhase = null;
    state.revealedJokes = [];
    state.revealIndex = -1;
}

function skipReveal() {
    stopRevealSequence();
    playSound('win');
    render(true);
}

function renderRevealing() {
    if (!state.room) return '';
    const r = state.room;
    const result = r.roundResults[r.roundResults.length - 1];

    const revealOrder = result.revealOrder || r.submissions.map(s => s.id);
    const totalJokes = revealOrder.length;
    const revealed = state.revealedJokes;

    const commentary = result.aiCommentary;

    // Crowd reaction meter levels
    const meterLevels = ['Crickets', 'Chuckle', 'Laugh', 'ROFL'];
    const meterIndex = Math.min(revealed.length, meterLevels.length - 1);
    const meterPct = ((revealed.length) / totalJokes) * 100;

    // Aggregate reactions for current joke

    const currentReactions = current ? reactions.filter(rx => rx.submissionId === current.id) : [];

            ` : ''}

            ${current && !isShowingWinner ? `
                <div class="glow-card glow-card-red p-6 animate-slideIn">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-red-400 font-bold text-sm">NOT THE ONE...</span>
                        <span class="text-gray-500 text-xs">#${current.id}</span>
                    </div>
                    <p class="text-lg">"${esc(current.punchline)}"</p>
                    <p class="text-gray-500 text-sm mt-1">by ${esc(current.playerName)}</p>
                    ${commentary?.roasts?.[current.id] ? `
                        <p class="text-gray-400 text-sm mt-2 italic typewriter">${esc(commentary.roasts[current.id])}</p>
                    ` : ''}
                    ${Object.keys(emojiCounts).length > 0 ? `
                        <div class="flex gap-2 mt-2">${Object.entries(emojiCounts).map(([e,c]) => `<span class="text-xs bg-slate-700 px-2 py-1 rounded-full">${e} x${c}</span>`).join('')}</div>

            ${isShowingWinner ? `

                    <div class="text-6xl mb-3">👑</div>
                    <p class="text-yellow-400 font-bold text-xl mb-2">THE ORACLE HAS SPOKEN!</p>
                    <p class="text-2xl font-bold my-3">"${esc(current.punchline)}"</p>
                    <p class="text-gray-300">by <span class="text-white font-bold text-lg">${current.playerName}</span></p>
                    ${commentary?.winnerComment ? `
                        <p class="text-yellow-300 text-sm mt-3 italic">${esc(commentary.winnerComment)}</p>
                    ` : ''}
                    ${result.streak >= 2 ? `
                        <div class="mt-3 streak-fire text-lg font-bold text-orange-400">${'🔥'.repeat(Math.min(result.streak, 5))} ${result.streak}-WIN STREAK!</div>

    if (!result) return renderJudging();
    
    // Determine judging method badge and info
    const judgingMethod = result.judgingMethod || r.lastJudgingMethod || 'ai';
    const isOnChain = judgingMethod === 'genlayer_optimistic_democracy';
    const isAI = judgingMethod === 'claude_api';
    
    const methodBadge = isOnChain
        ? '<span class="text-xs bg-green-600 px-2 py-1 rounded-full font-medium">⛓️ On-Chain Verified (GenLayer)</span>'
        : isAI
        ? '<span class="text-xs bg-purple-600 px-2 py-1 rounded-full font-medium">🤖 AI Judged (Simulated OD)</span>'
        : '<span class="text-xs bg-gray-600 px-2 py-1 rounded-full font-medium">🎲 Fallback</span>';
    
    // Get winner ID
    const winnerId = result.winnerId;
    
    // Generate validator votes if not already generated
    if (!state.validatorVotes || state.validatorVotes.length === 0) {
        const submissions = r.submissions || [];
        const otherIds = submissions.map(s => s.id).filter(id => id !== winnerId);
        state.validatorVotes = [];
        for (let i = 0; i < 5; i++) {
            if (i < 4 || Math.random() > 0.5) {
                state.validatorVotes.push(winnerId);
            } else if (otherIds.length > 0) {
                state.validatorVotes.push(otherIds[Math.floor(Math.random() * otherIds.length)]);
            } else {
                state.validatorVotes.push(winnerId);
            }
        }
    }
    
    const validatorVotes = state.validatorVotes;
    const validators = ['GPT-4', 'Claude', 'LLaMA', 'Gemini', 'Mixtral'];

                        const agreed = vote === winnerId;
                        return `
                            <div class="flex flex-col items-center">
                                <div class="w-10 h-10 rounded-full ${agreed ? 'bg-green-500' : 'bg-orange-500'} flex items-center justify-center text-sm font-bold shadow-lg">
                                    ${agreed ? '✓' : '✗'}

                                <span class="text-xs text-gray-400 mt-1">${v.split('-')[0]}</span>
                            </div>

                    <p class="text-xs text-gray-400 mb-1">The Oracle says:</p>

                <div class="glow-card glow-card-cyan p-4 text-center animate-comeback">

function renderFinalResults() {
    if (!state.room) return '<div class="text-center py-20"><div class="spinner mx-auto"></div></div>';
    const r = state.room;
    const standings = [...r.players].sort((a,b)=>b.score-a.score);
    const winner = standings[0];
    const playerRank = standings.findIndex(p=>p.name===state.playerName)+1;
    const isWinner = playerRank === 1;
    const playerScore = r.players.find(p=>p.name===state.playerName)?.score || 0;

    // Session stats
    let roundsWon = 0, correctBets = 0, totalXP = playerScore, bestJoke = null;
    for (const rr of (r.roundResults || [])) {
        if (rr.winnerName === state.playerName) {
            roundsWon++;
            if (!bestJoke) bestJoke = rr.winningPunchline;
        }
    }

    // Track games today
    const todayKey = 'gamesToday_' + getTodayKeyClient();
    const gamesToday = parseInt(localStorage.getItem(todayKey) || '0') + 1;
    localStorage.setItem(todayKey, gamesToday);

    return `
        <div class="space-y-4">
            <div class="text-center py-4">
                <div class="text-7xl mb-3">${isWinner?'🎉':'🏆'}</div>
                <h2 class="text-3xl font-bold"><span class="gradient-text">Game Over!</span></h2>
            </div>
            <div class="glow-card glow-card-gold p-6 text-center">
                <p class="text-yellow-400 text-sm font-medium">Winner!</p>
                <p class="text-3xl font-bold">${esc(winner.name)}</p>
                <p class="text-2xl text-yellow-400 mt-1">${winner.score} XP</p>
                ${winner.isBot ? '<p class="text-gray-400 text-sm">(Bot)</p>' : ''}
            </div>

            <!-- Session Recap -->
            <div class="glow-card p-4">
                <h3 class="font-bold mb-3 text-center text-purple-400">📊 Session Recap</h3>
                <div class="grid grid-cols-4 gap-3 text-center">
                    <div class="stat-count" style="animation-delay:0.1s">
                        <p class="text-2xl font-bold text-yellow-400">${totalXP}</p>
                        <p class="text-xs text-gray-400">XP Earned</p>
                    </div>
                    <div class="stat-count" style="animation-delay:0.2s">
                        <p class="text-2xl font-bold text-green-400">${roundsWon}/${r.totalRounds}</p>
                        <p class="text-xs text-gray-400">Rounds Won</p>
                    </div>
                    <div class="stat-count" style="animation-delay:0.3s">
                        <p class="text-2xl font-bold text-blue-400">#${playerRank}</p>
                        <p class="text-xs text-gray-400">Finish</p>
                    </div>
                    <div class="stat-count" style="animation-delay:0.4s">
                        <p class="text-2xl font-bold text-purple-400">${gamesToday}</p>
                        <p class="text-xs text-gray-400">Games Today</p>
                    </div>
                </div>
                ${bestJoke ? `<p class="text-center text-sm text-gray-400 mt-3 italic">Best joke: "${esc(bestJoke)}"</p>` : ''}
            </div>

            <!-- Profile Update -->
            ${state.profile ? `
                <div class="glow-card p-4">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-600 to-pink-600 flex items-center justify-center font-bold shadow-lg shadow-purple-500/20">${state.profile.level}</div>
                        <div class="flex-1">
                            <p class="text-sm font-bold">${esc(state.profile.title)}</p>
                            <div class="h-2.5 bg-slate-800 rounded-full overflow-hidden mt-1">
                                <div class="h-full xp-bar" style="width:${state.nextLevelXP ? Math.min(100, ((state.profile.lifetimeXP) / state.nextLevelXP) * 100) : 100}%"></div>
                            </div>
                        </div>
                        <p class="text-yellow-400 font-bold text-sm">${state.profile.lifetimeXP?.toLocaleString()} XP</p>
                    </div>
                </div>
            ` : ''}

            <div class="glow-card p-4">
                <h3 class="font-bold mb-3">🏅 Final Standings</h3>
                <div class="space-y-2">
                    ${standings.map((p,i) => `
                        <div class="flex justify-between items-center p-2.5 ${p.name===state.playerName?'bg-purple-500/20 ring-1 ring-purple-500':i<3?'bg-yellow-500/10 border border-yellow-500/10':'bg-slate-800/60'} rounded-xl">
                            <div class="flex items-center gap-2">
                                <span class="text-lg">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</span>
                                <span>${esc(p.name)}</span>
                                ${p.isBot?'<span class="text-xs bg-slate-600 px-1.5 py-0.5 rounded-full">BOT</span>':''}
                                ${p.name===state.playerName?'<span class="text-xs bg-purple-500 px-1.5 py-0.5 rounded-full">YOU</span>':''}
                            </div>
                            <span class="text-yellow-400 font-bold">${p.score} XP</span>
                        </div>
                    `).join('')}
                </div>
            </div>
            ${isWinner && !winner.isBot ? '<p class="text-center text-2xl animate-pulse">🎉 You Won! 🎉</p>' : `<p class="text-center text-gray-400">You finished #${playerRank}</p>`}

            <!-- Share Buttons -->

            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="createRoom('${r.category}',${r.isSinglePlayer})" class="btn btn-play py-4 rounded-xl font-bold text-lg text-white">🔄 Rematch</button>
                <button onclick="leaveRoom()" class="btn btn-primary py-4 rounded-xl font-bold text-lg text-white">🎮 Play Again</button>
            </div>
        </div>
    `;
}

                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    <span class="text-xs text-red-400 font-bold uppercase tracking-wider">Spectating</span>
                </div>
            </div>

            <div class="glow-card p-5 text-center">
                <p class="text-xs text-gray-500 mb-1">Round ${round} / ${total}</p>
                <h2 class="text-xl font-bold mb-2"><span class="gradient-text">${esc(r.jokePrompt || 'Waiting for round...')}</span></h2>
                <p class="text-sm text-purple-400">${r.category || ''} ${r.singlePlayer ? '(Solo)' : ''}</p>
            </div>

            <div class="glow-card p-4">
                <p class="text-xs text-gray-400 mb-2 uppercase tracking-wider">Phase: <span class="text-white font-bold">${phase}</span></p>
                ${phase === 'submitting' ? `
                    <div class="space-y-2">
                        <p class="text-sm text-gray-300">Players are writing punchlines...</p>
                        <div class="grid grid-cols-2 gap-2">
                            ${players.map(p => `
                                <div class="flex items-center gap-2 bg-slate-800/60 rounded-lg p-2">
                                    <span class="w-2 h-2 rounded-full ${r.submissions?.some(s => s.playerName === p.name) ? 'bg-green-500' : 'bg-yellow-500 animate-pulse'}"></span>
                                    <span class="text-sm">${esc(p.name)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                ` : ''}
                ${phase === 'betting' ? `
                    <div class="space-y-2">
                        <p class="text-sm text-gray-300">Players are placing bets on who'll win...</p>
                        ${(r.submissions || []).map((s, i) => `
                            <div class="bg-slate-800/60 rounded-lg p-3">
                                <p class="text-xs text-gray-500">#${i+1} by ${esc(s.playerName)}</p>
                                <p class="text-white text-sm">"${esc(s.punchline)}"</p>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
                ${phase === 'judging' ? renderJudging() : ''}
                ${phase === 'results' || phase === 'roundResults' ? `
                    <div class="space-y-2">
                        ${r.roundResults?.length > 0 ? (() => {
                            const last = r.roundResults[r.roundResults.length - 1];
                            return `
                                <div class="glow-card glow-card-gold p-4 text-center">
                                    <p class="text-xs text-yellow-400 mb-1">Round Winner</p>
                                    <p class="text-xl font-bold">${esc(last.winnerName || '')}</p>
                                    <p class="text-sm text-gray-300 mt-1">"${esc(last.winningPunchline || '')}"</p>
                                </div>
                            `;
                        })() : '<p class="text-gray-500 text-sm">Waiting for results...</p>'}
                    </div>
                ` : ''}
                ${phase === 'waiting' ? '<p class="text-sm text-gray-400">Waiting for players to join...</p>' : ''}
                ${phase === 'finished' ? `
                    <div class="text-center">
                        <div class="text-4xl mb-2">🏆</div>
                        <p class="text-xl font-bold text-yellow-400">${standings[0]?.name || ''} Wins!</p>
                        <p class="text-sm text-gray-400">Final score: ${standings[0]?.score || 0} XP</p>
                    </div>
                ` : ''}
            </div>

            <!-- Live Scoreboard -->
            <div class="glow-card p-4">
                <p class="text-xs text-gray-400 mb-2 uppercase tracking-wider">Scoreboard</p>
                <div class="space-y-1.5">
                    ${standings.map((p, i) => `
                        <div class="flex justify-between items-center p-2 ${i === 0 ? 'bg-yellow-500/10' : 'bg-slate-800/40'} rounded-lg">
                            <div class="flex items-center gap-2">
                                <span class="text-sm">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</span>
                                <span class="text-sm">${esc(p.name)}</span>
                            </div>
                            <span class="text-yellow-400 font-bold text-sm">${p.score} XP</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `;
}

// --- Render: Tournament ---
function renderTournament() {
    const t = state.tournament;
    // If no tournament selected, show list
    if (!t) {
        return `
            <div class="space-y-4">
                <button onclick="state.screen='lobby';state.showTournaments=false;render()" class="btn btn-ghost px-3 py-1.5 rounded-lg text-gray-400 text-sm">&larr; Back to Lobby</button>
                <div class="text-center">
                    <div class="text-5xl mb-2">⚔️</div>
                    <h2 class="text-2xl font-bold"><span class="gradient-text">Tournaments</span></h2>
                    <p class="text-gray-400 text-sm">Bracket elimination. Last comedian standing.</p>
                </div>

                <!-- Create tournament -->
                <div class="glow-card glow-card-red p-5">
                    <h3 class="font-bold mb-3">Create Tournament</h3>
                    <div class="grid grid-cols-3 gap-2 mb-3">
                        <button onclick="document.getElementById('t-cat').value='tech'" class="btn cat-btn p-2 bg-slate-800 rounded-lg text-sm" id="t-cat-tech">🤖 Tech</button>
                        <button onclick="document.getElementById('t-cat').value='crypto'" class="btn cat-btn p-2 bg-slate-800 rounded-lg text-sm">💎 Crypto</button>
                        <button onclick="document.getElementById('t-cat').value='general'" class="btn cat-btn p-2 bg-slate-800 rounded-lg text-sm">😂 General</button>
                    </div>
                    <input type="text" id="t-cat" value="general" class="hidden">
                    <div class="flex gap-2">
                        <select id="t-size" class="flex-1 bg-slate-800 text-white rounded-lg px-3 py-2 text-sm border border-white/10">
                            <option value="8">8 players</option>
                            <option value="16">16 players</option>
                            <option value="32">32 players</option>
                        </select>
                        <button onclick="createTournament(document.getElementById('t-cat').value, parseInt(document.getElementById('t-size').value))" class="btn btn-play px-6 py-2 rounded-lg font-bold text-white text-sm">Create</button>
                    </div>
                </div>

                <!-- Tournament list -->
                ${state.tournaments.length > 0 ? `
                    <div class="space-y-2">
                        ${state.tournaments.map(tr => `
                            <div class="glow-card p-4">
                                <div class="flex justify-between items-center">
                                    <div>
                                        <p class="font-bold text-sm">${tr.category || 'General'} Tournament</p>
                                        <p class="text-xs text-gray-400">${tr.players?.length || 0} / ${tr.size} players &middot; ${tr.status}</p>
                                        <p class="text-xs text-gray-500">Host: ${esc(tr.host || '')}</p>
                                    </div>
                                    <div class="flex gap-2">
                                        ${tr.status === 'registration' ? `
                                            <button onclick="joinTournament('${tr.id}')" class="btn btn-primary px-3 py-1.5 rounded-lg text-xs text-white">Join</button>
                                        ` : `
                                            <button onclick="joinTournament('${tr.id}', true)" class="btn btn-ghost px-3 py-1.5 rounded-lg text-xs">Watch</button>
                                        `}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` : '<p class="text-gray-500 text-center py-4">No active tournaments. Create one!</p>'}
            </div>
        `;
    }

    // Tournament detail view
    const isHost = t.host === state.playerName;
    const bracket = t.bracket || [];
    const currentRoundIdx = (t.currentRound || 1) - 1;

    return `
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <button onclick="state.tournament=null;state.screen='lobby';render()" class="btn btn-ghost px-3 py-1.5 rounded-lg text-gray-400 text-sm">&larr; Leave</button>
                <span class="text-xs text-gray-400 font-mono">${t.id}</span>
            </div>

            <div class="glow-card glow-card-red p-5 text-center">
                <div class="text-4xl mb-2">⚔️</div>
                <h2 class="text-xl font-bold">${esc(t.category || 'General')} Tournament</h2>
                <p class="text-sm text-gray-400">${t.size}-player bracket &middot; <span class="text-white font-bold">${t.status}</span></p>
                <p class="text-xs text-gray-500 mt-1">${(t.players || []).length} / ${t.size} players</p>
            </div>

            ${t.status === 'registration' ? `
                <!-- Registration phase -->
                <div class="glow-card p-4">
                    <p class="text-sm text-gray-400 mb-2">Players</p>
                    <div class="grid grid-cols-2 gap-2">
                        ${(t.players || []).map(p => `
                            <div class="bg-slate-800/60 rounded-lg p-2 text-center">
                                <span class="text-sm">${esc(p.name || p)}</span>
                            </div>
                        `).join('')}
                        ${Array(Math.max(0, t.size - (t.players||[]).length)).fill(0).map(() => `
                            <div class="bg-slate-800/30 rounded-lg p-2 text-center border border-dashed border-white/10">
                                <span class="text-xs text-gray-600">empty</span>
                            </div>
                        `).join('')}
                    </div>
                    ${isHost ? `
                        <button onclick="startTournament()" class="btn btn-play w-full mt-4 py-3 rounded-xl font-bold text-white" ${(t.players||[]).length < 2 ? 'disabled' : ''}>
                            Start Tournament (${(t.players||[]).length} players)
                        </button>
                    ` : '<p class="text-xs text-gray-500 mt-3 text-center">Waiting for host to start...</p>'}
                </div>
            ` : ''}

            ${t.status === 'active' || t.status === 'finished' ? `
                <!-- Bracket view -->
                <div class="space-y-3">
                    ${bracket.map((round, ri) => `
                        <div class="glow-card ${ri === currentRoundIdx ? 'glow-card-gold' : ''} p-4">
                            <p class="text-xs text-gray-400 mb-2 uppercase tracking-wider">${round.name || 'Round ' + (ri+1)}</p>
                            <div class="space-y-2">
                                ${(round.matches || []).map(m => {
                                    const p1 = m.player1 || 'TBD';
                                    const p2 = m.player2 || 'BYE';
                                    const winner = m.winner || null;
                                    return `
                                        <div class="flex items-center gap-2 bg-slate-800/60 rounded-lg p-2.5">
                                            <div class="flex-1 text-sm ${winner === p1 ? 'text-yellow-400 font-bold' : winner ? 'text-gray-600 line-through' : 'text-white'}">${esc(p1)}</div>
                                            <span class="text-xs text-gray-600">vs</span>
                                            <div class="flex-1 text-right text-sm ${winner === p2 ? 'text-yellow-400 font-bold' : winner ? 'text-gray-600 line-through' : p2 === 'BYE' ? 'text-gray-600 italic' : 'text-white'}">${esc(p2)}</div>
                                            ${winner ? `<span class="text-xs text-green-400 ml-1">✓</span>` : m.player1 && m.player2 && m.player2 !== 'BYE' ? `<span class="text-xs text-yellow-400 animate-pulse ml-1">⏳</span>` : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>

                ${t.winner ? `
                    <div class="glow-card glow-card-gold p-5 text-center animate-winnerScale">
                        <div class="text-5xl mb-2">🏆</div>
                        <h3 class="text-2xl font-bold text-yellow-400">${esc(t.winner)}</h3>
                        <p class="text-gray-400">Tournament Champion!</p>
                    </div>
                ` : ''}
            ` : ''}

            <button onclick="fetchTournament(state.tournament?.id)" class="btn btn-ghost w-full py-2 rounded-xl text-xs text-gray-400">Refresh</button>
        </div>
    `;
}

// --- Render: Community Prompts ---
function renderCommunityPrompts() {
    return `
        <div class="space-y-4">
            <button onclick="state.screen='lobby';state.showCommunityPrompts=false;render()" class="btn btn-ghost px-3 py-1.5 rounded-lg text-gray-400 text-sm">&larr; Back to Lobby</button>
            <div class="text-center">
                <div class="text-5xl mb-2">💡</div>
                <h2 class="text-2xl font-bold"><span class="gradient-text">Community Prompts</span></h2>
                <p class="text-gray-400 text-sm">Submit joke setups. Top-voted enter the game rotation!</p>
            </div>

            <!-- Submit form -->
            <div class="glow-card glow-card-cyan p-5">
                <h3 class="font-bold text-sm mb-2">Submit a Joke Setup</h3>
                <textarea id="community-prompt-input" rows="2" maxlength="150" placeholder="e.g. Why do blockchain developers..." class="w-full px-3 py-2 rounded-xl text-sm resize-none"></textarea>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-xs text-gray-500">10-150 characters</span>
                    <button onclick="submitCommunityPrompt()" class="btn btn-primary px-4 py-1.5 rounded-lg text-sm font-bold text-white">Submit</button>
                </div>
            </div>

            <!-- Prompt list -->
            ${state.communityPrompts.length > 0 ? `
                <div class="space-y-2">
                    ${state.communityPrompts.map((p, i) => `
                        <div class="glow-card ${p.status === 'approved' ? 'glow-card-green' : ''} p-4">
                            <div class="flex items-start justify-between gap-3">
                                <div class="flex-1">
                                    <p class="text-white text-sm font-medium">"${esc(p.prompt)}"</p>
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="text-xs text-gray-500">by ${esc(p.author || 'Anon')}</span>
                                        ${p.status === 'approved' ? '<span class="text-xs text-green-400 font-bold">IN ROTATION</span>' : ''}

                                </div>

                                    <span class="text-lg block">👍</span>
                                    <span class="text-xs text-gray-400">${p.votes || 0}</span>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            ` : '<p class="text-gray-500 text-center py-8">No submissions yet. Be the first!</p>'}
        </div>
    `;
}

// --- Render: Seasonal Leaderboard ---
function renderSeasons() {
    const seasons = state.availableSeasons || [];
    const selected = state.selectedSeason || state.currentSeason;
    const lb = state.seasonalLeaderboard || [];

    return `
        <div class="space-y-4">
            <button onclick="state.screen='lobby';render()" class="btn btn-ghost px-3 py-1.5 rounded-lg text-gray-400 text-sm">&larr; Back to Lobby</button>
            <div class="text-center">
                <div class="text-5xl mb-2">📅</div>
                <h2 class="text-2xl font-bold"><span class="gradient-text">Past Seasons</span></h2>
                <p class="text-gray-400 text-sm">Monthly leaderboard archives</p>
            </div>

            <!-- Season selector -->
            <div class="flex flex-wrap gap-2 justify-center">
                ${seasons.map(s => `
                    <button onclick="fetchSeasonalLeaderboard('${s.key}')" class="btn ${s.key === selected ? 'btn-primary' : 'btn-ghost'} px-4 py-2 rounded-lg text-sm text-white">
                        ${s.label || s.key}
                        ${s.key === state.currentSeason ? ' (Current)' : ''}
                    </button>
                `).join('')}
                ${seasons.length === 0 ? '<p class="text-gray-500 text-sm">No past seasons yet.</p>' : ''}
            </div>

            <!-- Leaderboard -->
            ${lb.length > 0 ? `
                <div class="glow-card p-5">
                    <p class="text-sm text-gray-400 mb-3">${selected === state.currentSeason ? 'Current Season' : 'Season: ' + (selected || '')}</p>
                    <div class="space-y-2">
                        ${lb.map((p, i) => `
                            <div class="flex justify-between items-center p-2.5 ${i < 3 ? 'bg-yellow-500/10 border border-yellow-500/10' : 'bg-slate-800/60'} rounded-xl">
                                <div class="flex items-center gap-2">
                                    <span class="text-lg">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</span>
                                    <span class="text-sm">${esc(p.name)}</span>
                                </div>
                                <span class="text-yellow-400 font-bold text-sm">${p.score || p.totalScore || 0} XP</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            ` : selected ? '<p class="text-gray-500 text-center py-8">No data for this season.</p>' : ''}
        </div>
    `;
}

function shareRoundResult() {
    if (!state.room) return;
    const r = state.room;
    const result = r.roundResults?.[r.roundResults.length - 1];
    if (!result) return;
    shareImage(r.jokePrompt, result.winningPunchline, result.winnerName, result.scores?.[result.winnerName] || 100, result.aiCommentary?.winnerComment || null);
}

function shareFinalResult() {
    if (!state.room) return;
    const r = state.room;
    const standings = [...r.players].sort((a,b) => b.score - a.score);
    const winner = standings[0];
    shareImage(r.jokePrompt || 'Oracle of Wit', winner.name + ' won!', state.playerName, r.players.find(p => p.name === state.playerName)?.score || 0, null);
}

function getNextLevelXPClient(xp) {
    const thresholds = [0,500,1500,3000,6000,10000,20000,40000,75000,150000];
    for (const t of thresholds) {
        if (xp < t) return t;
    }
    return null;
}

// --- Spectator Mode ---
async function joinAsSpectator(roomId) {
    try {
        const res = await api('joinRoom', { roomId, playerName: state.playerName, spectator: true });
        if (res.success) {
            state.roomId = roomId;
            state.room = res.room;
            state.isSpectator = true;
            startPolling();
            render(true);
        }
    } catch(e) {}
}

// --- Seasonal Leaderboard ---
async function fetchSeasonalLeaderboard(season) {
    try {
        const res = await fetch(`${API_URL}?action=getSeasonalLeaderboard`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ season })
        });
        const data = await res.json();
        if (data.success) {
            state.seasonalLeaderboard = data.leaderboard;
            state.selectedSeason = data.season;
            render();
        }
    } catch(e) {}
}

async function fetchSeasons() {
    try {
        const res = await fetch(`${API_URL}?action=getSeasons`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        const data = await res.json();
        if (data.success) {
            state.availableSeasons = data.seasons;
            state.currentSeason = data.currentSeason;
        }
    } catch(e) {}
}

// --- Community Prompts ---
async function fetchCommunityPrompts() {
    try {
        const res = await fetch(`${API_URL}?action=getPromptSubmissions`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        const data = await res.json();
        if (data.success) {
            state.communityPrompts = data.prompts;
            state.showCommunityPrompts = true;
            render();
        }
    } catch(e) {}
}

async function submitCommunityPrompt() {
    const input = document.getElementById('community-prompt-input');
    if (!input || !input.value.trim()) return;
    try {
        await api('submitPrompt', { playerName: state.playerName, prompt: input.value.trim(), playerId: state.playerId });
        input.value = '';
        fetchCommunityPrompts();
    } catch(e) {}
}

async function voteCommunityPrompt(promptId) {
    try {
        await api('votePrompt', { promptId, playerId: state.playerId });
        fetchCommunityPrompts();
    } catch(e) {}
}

// --- Tournament Mode ---
async function fetchTournaments() {
    try {
        const res = await fetch(`${API_URL}?action=listTournaments`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        const data = await res.json();
        if (data.success) {
            state.tournaments = data.tournaments;
            state.showTournaments = true;
            render();
        }
    } catch(e) {}
}

async function createTournament(category, size) {
    try {
        const res = await api('createTournament', { hostName: state.playerName, category, size });
        if (res.success) {
            state.tournament = res.tournament;
            state.screen = 'tournament';
            render();
        }
    } catch(e) {}
}

async function joinTournament(tournamentId, asSpectator = false) {
    try {
        const res = await api('joinTournament', { tournamentId, playerName: state.playerName, spectator: asSpectator });
        if (res.success) {
            state.tournament = res.tournament;
            state.screen = 'tournament';
            render();
        }
    } catch(e) {}
}

async function startTournament() {
    if (!state.tournament) return;
    try {
        const res = await api('startTournament', { tournamentId: state.tournament.id, hostName: state.playerName });
        if (res.success) {
            state.tournament = res.tournament;
            render();
        }
    } catch(e) {}
}

async function fetchTournament(tid) {
    try {
        const res = await fetch(`${API_URL}?action=getTournament&id=${tid}`);
        const data = await res.json();
        if (data.success) {
            state.tournament = data.tournament;
            render();
        }
    } catch(e) {}
}

// Init: detect challenge links
detectChallenge();
render();
</script>
