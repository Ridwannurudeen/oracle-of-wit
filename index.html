<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle of Wit - GenLayer Community Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Space Grotesk', sans-serif; box-sizing: border-box; }
        body { background: #0f172a; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(135deg, #f59e0b, #ec4899, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .oracle-eye { background: radial-gradient(circle at 30% 30%, #a855f7, #6366f1, #1e1b4b); box-shadow: 0 0 60px rgba(168,85,247,0.5); }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 20px rgba(139,92,246,0.5); } 50% { box-shadow: 0 0 60px rgba(139,92,246,0.9); } }
        .animate-glow { animation: pulse-glow 2s ease-in-out infinite; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .animate-shake { animation: shake 0.5s ease-in-out; }
        @keyframes countdown-pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .countdown-critical { animation: countdown-pulse 0.5s ease-in-out infinite; }
        .btn { transition: all 0.2s; cursor: pointer; }
        .btn:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .card-selected { background: rgba(139,92,246,0.3) !important; border: 2px solid #a855f7 !important; box-shadow: 0 0 20px rgba(139,92,246,0.3); }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top-color: #a855f7; border-radius: 50%; animation: spin 1s linear infinite; width: 24px; height: 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .confetti { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 1000; }
        @keyframes confetti-fall { 0% { transform: translateY(-100vh) rotate(0deg); opacity:1; } 100% { transform: translateY(100vh) rotate(720deg); opacity:0; } }
        .timer-bar { transition: width 0.5s linear; }
        textarea, input[type="text"] { background: #1e293b !important; color: white !important; }
        .rotate-180 { transform: rotate(180deg); }
        .transition-transform { transition: transform 0.3s ease; }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
        <div class="absolute top-1/4 -left-20 w-96 h-96 bg-purple-600/20 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-pink-600/20 rounded-full blur-3xl animate-pulse" style="animation-delay:1s"></div>
    </div>
    <div id="app"></div>

<script>
const API_URL = '/api/game';
const BASE_POLL_INTERVAL = 1500;
let currentPollInterval = BASE_POLL_INTERVAL;
let soundEnabled = true;
let audioCtx = null;
let isTyping = false; // Track if user is typing
let typingTimeout = null;

// Dynamic polling - slower for larger rooms to reduce server load
function getPollInterval() {
    const playerCount = state.room?.players?.length || 0;
    if (playerCount > 50) return 3000;  // 3s for 50+ players
    if (playerCount > 20) return 2500;  // 2.5s for 20-50 players
    if (playerCount > 10) return 2000;  // 2s for 10-20 players
    return BASE_POLL_INTERVAL;          // 1.5s for small rooms
}

// Mark user as typing (prevents full re-renders)
function setTyping() {
    isTyping = true;
    if (typingTimeout) clearTimeout(typingTimeout);
    // Keep typing flag active for 3 seconds after last keystroke
    typingTimeout = setTimeout(() => { isTyping = false; }, 3000);
}

// Update ONLY the timer display without re-rendering everything
function updateTimerDisplay() {
    const timerEl = document.getElementById('timer-display');
    const timerBar = document.getElementById('timer-bar');
    const timerWarning = document.getElementById('timer-warning');
    
    if (timerEl) {
        const isLow = state.timeLeft <= 10;
        timerEl.textContent = formatTime(state.timeLeft);
        timerEl.className = `text-3xl font-bold ${isLow ? 'countdown-critical text-red-500' : ''}`;
    }
    if (timerBar) {
        const max = state.screen === 'submitting' ? 40 : 30;
        const pct = (state.timeLeft / max) * 100;
        const isLow = state.timeLeft <= 10;
        timerBar.style.width = `${pct}%`;
        timerBar.className = `h-full timer-bar rounded-full ${isLow ? 'bg-red-500' : 'bg-gradient-to-r from-purple-500 to-pink-500'}`;
    }
    if (timerWarning) {
        timerWarning.style.display = state.timeLeft <= 10 ? 'block' : 'none';
    }
}

// Update character count without re-rendering
function updateCharCount() {
    const charCount = document.getElementById('char-count');
    if (charCount) {
        charCount.textContent = `${state.punchlineText.length}/200`;
    }
}

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    if (!soundEnabled || !audioCtx) return;
    const sounds = {
        click: [600, 0.1, 'sine'],
        submit: [800, 0.15, 'sine'],
        bet: [500, 0.2, 'triangle'],
        win: [[523,659,784], 0.3, 'sine'],
        tick: [1000, 0.05, 'square'],
        start: [[440,554,659], 0.2, 'sine'],
        warning: [[440,220], 0.3, 'sawtooth']
    };
    const s = sounds[type];
    if (!s) return;
    try {
        const freqs = Array.isArray(s[0]) ? s[0] : [s[0]];
        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = f; osc.type = s[2];
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + s[1]);
            osc.start(audioCtx.currentTime + i * 0.1);
            osc.stop(audioCtx.currentTime + s[1] + i * 0.1);
        });
    } catch(e) {}
}

let state = {
    screen: 'welcome',
    playerName: localStorage.getItem('playerName') || '',
    roomId: null,
    room: null,
    isHost: false,
    selectedSubmission: null,
    betAmount: 50,
    hasSubmitted: false,
    hasBet: false,
    error: null,
    loading: false,
    leaderboard: [],
    publicRooms: [],
    timeLeft: 0,
    punchlineText: '',
    showHelp: false
};

let pollInterval = null;
let timerInterval = null;
let renderPending = false;
let lastRenderTime = 0;
const MIN_RENDER_INTERVAL = 100; // Minimum ms between renders

function syncTimer() {
    if (!state.room?.phaseEndsAt) { state.timeLeft = 0; return; }
    state.timeLeft = Math.max(0, Math.floor((state.room.phaseEndsAt - Date.now()) / 1000));
}

function startTimer() {
    stopTimer();
    timerInterval = setInterval(() => {
        if (state.timeLeft > 0) {
            state.timeLeft--;
            if (state.timeLeft <= 5 && state.timeLeft > 0) playSound('tick');
            if (state.timeLeft === 10) playSound('warning');
            // ALWAYS use targeted update - NEVER full render from timer
            updateTimerDisplay();
        }
    }, 1000);
}

function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function formatTime(s) {
    return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

async function api(action, data = {}) {
    state.loading = true;
    state.error = null;
    // Don't render during loading if user is typing
    if (!isTyping) render();
    try {
        const res = await fetch(`${API_URL}?action=${action}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        state.loading = false;
        if (!res.ok || result.error) throw new Error(result.error || 'Error');
        return result;
    } catch (e) {
        state.loading = false;
        state.error = e.message;
        render(true); // Force render to show error
        throw e;
    }
}

async function fetchRoom() {
    if (!state.roomId) return;
    try {
        const res = await fetch(`${API_URL}?action=getRoom&roomId=${state.roomId}`);
        const result = await res.json();
        if (result.success && result.room) {
            const oldStatus = state.room?.status;
            const oldSubmissionCount = state.room?.submissions?.length || 0;
            const oldBetCount = state.room?.bets?.length || 0;
            const oldPlayerCount = state.room?.players?.length || 0;
            
            state.room = result.room;
            syncTimer();
            
            // Only render if status changed
            if (state.room.status !== oldStatus) {
                handlePhaseChange(oldStatus, state.room.status);
                render(true); // Force render on phase change
                return;
            }
            
            // Check if something important changed
            const newSubmissionCount = state.room?.submissions?.length || 0;
            const newBetCount = state.room?.bets?.length || 0;
            const newPlayerCount = state.room?.players?.length || 0;
            
            const hasImportantChange = 
                newSubmissionCount !== oldSubmissionCount ||
                newBetCount !== oldBetCount ||
                newPlayerCount !== oldPlayerCount;
            
            // Only render if something important changed AND user is not typing
            if (hasImportantChange && !isTyping) {
                render();
            }
            // Always update timer display
            updateTimerDisplay();
        }
    } catch (e) {}
}

function handlePhaseChange(oldStatus, newStatus) {
    // Reset typing flag on phase change
    isTyping = false;
    if (typingTimeout) clearTimeout(typingTimeout);
    
    state.screen = newStatus === 'roundResults' ? 'roundResults' : newStatus;
    if (newStatus === 'submitting') {
        playSound('start');
        state.hasSubmitted = false;
        state.punchlineText = '';
        syncTimer();
        startTimer();
    } else if (newStatus === 'betting') {
        playSound('click');
        state.hasBet = false;
        state.selectedSubmission = null;
        syncTimer();
        startTimer();
    } else if (newStatus === 'roundResults') {
        stopTimer();
        playSound('win');
    } else if (newStatus === 'finished') {
        stopTimer();
        stopPolling();
        playSound('win');
        createConfetti();
    } else if (newStatus === 'judging') {
        stopTimer();
    }
}

async function fetchLeaderboard() {
    try {
        const res = await fetch(`${API_URL}?action=getLeaderboard`);
        const result = await res.json();
        if (result.success) state.leaderboard = result.leaderboard || [];
    } catch (e) {}
}

async function fetchPublicRooms() {
    try {
        const res = await fetch(`${API_URL}?action=listRooms`);
        const result = await res.json();
        if (result.success) { state.publicRooms = result.rooms || []; render(); }
    } catch (e) {}
}

function startPolling() {
    stopPolling();
    fetchRoom();
    scheduleNextPoll();
}

function scheduleNextPoll() {
    currentPollInterval = getPollInterval();
    pollInterval = setTimeout(() => {
        fetchRoom();
        if (state.roomId) {
            scheduleNextPoll(); // Recursively schedule with updated interval
        }
    }, currentPollInterval);
}

function stopPolling() {
    if (pollInterval) { 
        clearTimeout(pollInterval); 
        pollInterval = null; 
    }
}

async function createRoom(category, singlePlayer = false) {
    initAudio();
    playSound('click');
    try {
        const result = await api('createRoom', { hostName: state.playerName, category, singlePlayer });
        state.roomId = result.roomId;
        state.room = result.room;
        state.isHost = true;
        state.screen = 'waiting';
        localStorage.setItem('playerName', state.playerName);
        startPolling();
        render();
    } catch (e) {}
}

async function joinRoom(roomId) {
    if (!roomId?.trim()) { state.error = 'Enter room code'; render(); return; }
    initAudio();
    playSound('click');
    try {
        const result = await api('joinRoom', { roomId: roomId.toUpperCase(), playerName: state.playerName });
        state.roomId = roomId.toUpperCase();
        state.room = result.room;
        state.isHost = state.room.host === state.playerName;
        state.screen = 'waiting';
        localStorage.setItem('playerName', state.playerName);
        startPolling();
        render();
    } catch (e) {}
}

async function startGame() {
    playSound('start');
    try {
        const result = await api('startGame', { roomId: state.roomId, hostName: state.playerName });
        state.room = result.room;
        state.screen = 'submitting';
        state.hasSubmitted = false;
        state.punchlineText = '';
        syncTimer();
        startTimer();
        render();
    } catch (e) {}
}

async function submitPunchline() {
    const text = state.punchlineText.trim();
    if (!text) { state.error = 'Write a punchline first'; render(true); return; }
    // Reset typing flag since user is done typing
    isTyping = false;
    if (typingTimeout) clearTimeout(typingTimeout);
    playSound('submit');
    try {
        await api('submitPunchline', { roomId: state.roomId, playerName: state.playerName, punchline: text });
        state.hasSubmitted = true;
        render(true); // Force render after submission
    } catch (e) {}
}

async function placeBet() {
    if (!state.selectedSubmission) { state.error = 'Select a submission first'; render(); return; }
    playSound('bet');
    try {
        await api('placeBet', { roomId: state.roomId, playerName: state.playerName, submissionId: state.selectedSubmission, amount: state.betAmount });
        state.hasBet = true;
        render();
    } catch (e) {}
}

async function advancePhase() {
    playSound('click');
    try {
        const result = await api('advancePhase', { roomId: state.roomId, hostName: state.playerName });
        state.room = result.room;
        render();
    } catch (e) {}
}

async function nextRound() {
    playSound('click');
    try {
        const result = await api('nextRound', { roomId: state.roomId, hostName: state.playerName });
        state.room = result.room;
        if (result.room.status === 'finished') {
            state.screen = 'finished';
            state.leaderboard = result.leaderboard || [];
            stopPolling();
            stopTimer();
            playSound('win');
            createConfetti();
        } else {
            state.screen = 'submitting';
            state.hasSubmitted = false;
            state.punchlineText = '';
            playSound('start');
            syncTimer();
            startTimer();
        }
        render();
    } catch (e) {}
}

function leaveRoom() {
    playSound('click');
    stopPolling();
    stopTimer();
    state.roomId = null;
    state.room = null;
    state.isHost = false;
    state.hasSubmitted = false;
    state.hasBet = false;
    state.punchlineText = '';
    state.screen = 'lobby';
    fetchPublicRooms();
    render();
}

function goToLobby() {
    if (!state.playerName.trim()) { state.error = 'Enter your name'; render(); return; }
    initAudio();
    playSound('click');
    state.screen = 'lobby';
    localStorage.setItem('playerName', state.playerName);
    fetchPublicRooms();
    fetchLeaderboard();
    render();
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    if (soundEnabled) { initAudio(); playSound('click'); }
    render();
}

function selectSubmission(id) {
    state.selectedSubmission = id;
    playSound('click');
    render();
}

function copyRoomCode(code) {
    navigator.clipboard.writeText(code).then(() => {
        playSound('click');
        const feedback = document.getElementById('copy-feedback');
        if (feedback) {
            feedback.classList.remove('hidden');
            setTimeout(() => feedback.classList.add('hidden'), 2000);
        }
    }).catch(() => {
        // Fallback for older browsers
        const textArea = document.createElement('textarea');
        textArea.value = code;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        playSound('click');
    });
}

function toggleHelp() {
    state.showHelp = !state.showHelp;
    playSound('click');
    // Animate the toggle without full re-render
    const helpContent = document.getElementById('help-content');
    const toggleIcon = document.getElementById('help-toggle-icon');
    if (helpContent && toggleIcon) {
        helpContent.classList.toggle('hidden');
        toggleIcon.classList.toggle('rotate-180');
    }
}

function createConfetti() {
    const colors = ['#f59e0b','#ec4899','#6366f1','#10b981','#ef4444','#8b5cf6'];
    for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animation = `confetti-fall ${2+Math.random()*2}s linear forwards`;
        c.style.animationDelay = Math.random() * 0.5 + 's';
        c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4500);
    }
}

function render(force = false) {
    // Skip render completely while typing (unless forced)
    if (isTyping && !force) {
        updateTimerDisplay();
        return;
    }
    
    // Throttle renders to prevent freezing
    const now = Date.now();
    if (now - lastRenderTime < MIN_RENDER_INTERVAL && !force) {
        if (!renderPending) {
            renderPending = true;
            setTimeout(() => {
                renderPending = false;
                render();
            }, MIN_RENDER_INTERVAL);
        }
        return;
    }
    lastRenderTime = now;
    
    // Preserve textarea focus and cursor position
    const activeEl = document.activeElement;
    const wasTextareaFocused = activeEl && activeEl.id === 'punchline';
    let selectionStart = 0, selectionEnd = 0;
    if (wasTextareaFocused) {
        selectionStart = activeEl.selectionStart;
        selectionEnd = activeEl.selectionEnd;
    }
    
    document.getElementById('app').innerHTML = `
        <header class="py-3 px-4 border-b border-white/10 sticky top-0 bg-slate-900/95 backdrop-blur z-50">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span class="text-2xl animate-float">🎭</span>
                    <div>
                        <h1 class="text-lg font-bold gradient-text">Oracle of Wit</h1>
                        <p class="text-xs text-gray-500">GenLayer Game</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="toggleSound()" class="p-2 hover:bg-white/10 rounded text-lg">${soundEnabled ? '🔊' : '🔇'}</button>
                    ${state.playerName ? `<span class="px-2 py-1 bg-purple-600/30 rounded text-sm">${state.playerName}</span>` : ''}
                    ${state.roomId ? `<span class="px-2 py-1 bg-slate-700 rounded text-xs font-mono">${state.roomId}</span>` : ''}
                </div>
            </div>
        </header>
        <main class="px-4 py-6 max-w-4xl mx-auto pb-20">
            ${state.error ? `<div class="mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-300 animate-shake">⚠️ ${state.error} <button onclick="state.error=null;render()" class="ml-3 underline">×</button></div>` : ''}
            ${renderScreen()}
        </main>
    `;
    
    // Restore textarea focus and cursor position
    if (wasTextareaFocused) {
        const textarea = document.getElementById('punchline');
        if (textarea) {
            textarea.focus();
            textarea.setSelectionRange(selectionStart, selectionEnd);
        }
    }
}

function renderTimer() {
    if (state.timeLeft <= 0) return '';
    const isLow = state.timeLeft <= 10;
    const max = state.screen === 'submitting' ? 40 : 30;
    const pct = (state.timeLeft / max) * 100;
    return `
        <div class="glass rounded-xl p-4 mb-4">
            <div class="flex justify-between items-center mb-2">
                <span class="text-gray-400">⏱️ Time</span>
                <span id="timer-display" class="text-3xl font-bold ${isLow ? 'countdown-critical text-red-500' : ''}">${formatTime(state.timeLeft)}</span>
            </div>
            <div class="h-3 bg-slate-700 rounded-full overflow-hidden">
                <div id="timer-bar" class="h-full timer-bar rounded-full ${isLow ? 'bg-red-500' : 'bg-gradient-to-r from-purple-500 to-pink-500'}" style="width:${pct}%"></div>
            </div>
            <p id="timer-warning" class="text-red-400 text-sm mt-2 text-center animate-pulse" style="display:${isLow ? 'block' : 'none'}">⚡ Hurry!</p>
        </div>
    `;
}

function renderScreen() {
    switch (state.screen) {
        case 'welcome': return renderWelcome();
        case 'lobby': return renderLobby();
        case 'waiting': return renderWaiting();
        case 'submitting': return renderSubmitting();
        case 'betting': return renderBetting();
        case 'judging': return renderJudging();
        case 'roundResults': return renderRoundResults();
        case 'finished': return renderFinalResults();
        default: return renderWelcome();
    }
}

function renderWelcome() {
    return `
        <div class="text-center py-8">
            <div class="w-24 h-24 oracle-eye rounded-full flex items-center justify-center mx-auto mb-6 animate-float">
                <span class="text-5xl">👁️</span>
            </div>
            <h2 class="text-3xl font-bold mb-3">Welcome to <span class="gradient-text">Oracle of Wit</span></h2>
            <p class="text-gray-400 mb-4 max-w-md mx-auto">The AI humor prediction game powered by GenLayer</p>
            
            <!-- How to Play Section -->
            <div class="glass rounded-xl max-w-md mx-auto mb-6 overflow-hidden">
                <button onclick="toggleHelp()" class="w-full p-4 flex justify-between items-center hover:bg-white/5 transition-colors">
                    <span class="text-yellow-400 font-bold">📖 How to Play</span>
                    <span id="help-toggle-icon" class="text-gray-400 transition-transform ${state.showHelp ? 'rotate-180' : ''}">▼</span>
                </button>
                <div id="help-content" class="${state.showHelp ? '' : 'hidden'} border-t border-white/10 p-4 text-left">
                    <div class="space-y-4 text-sm">
                        <!-- Step 1 -->
                        <div class="flex gap-3">
                            <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center font-bold shrink-0">1</div>
                            <div>
                                <p class="font-bold text-white">Complete the Joke</p>
                                <p class="text-gray-400">You'll see a joke setup. Write the funniest punchline you can think of!</p>
                            </div>
                        </div>
                        <!-- Step 2 -->
                        <div class="flex gap-3">
                            <div class="w-8 h-8 bg-pink-600 rounded-full flex items-center justify-center font-bold shrink-0">2</div>
                            <div>
                                <p class="font-bold text-white">Bet on the Winner</p>
                                <p class="text-gray-400">See all submissions (anonymously) and bet XP on which one the AI Oracle will pick!</p>
                            </div>
                        </div>
                        <!-- Step 3 -->
                        <div class="flex gap-3">
                            <div class="w-8 h-8 bg-yellow-600 rounded-full flex items-center justify-center font-bold shrink-0">3</div>
                            <div>
                                <p class="font-bold text-white">AI Oracle Judges</p>
                                <p class="text-gray-400">Multiple AI validators vote using GenLayer's Optimistic Democracy to pick the funniest joke.</p>
                            </div>
                        </div>
                        <!-- Step 4 -->
                        <div class="flex gap-3">
                            <div class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center font-bold shrink-0">4</div>
                            <div>
                                <p class="font-bold text-white">Win XP!</p>
                                <p class="text-gray-400">Earn <span class="text-yellow-400">+100 XP</span> if your joke wins, plus <span class="text-yellow-400">2x your bet</span> if you predicted correctly!</p>
                            </div>
                        </div>
                        
                        <!-- Scoring Summary -->
                        <div class="mt-4 pt-4 border-t border-white/10">
                            <p class="font-bold text-white mb-2">🏆 Scoring:</p>
                            <div class="grid grid-cols-2 gap-2 text-xs">
                                <div class="bg-slate-800 rounded-lg p-2">
                                    <span class="text-green-400">Your joke wins</span>
                                    <span class="block text-yellow-400 font-bold">+100 XP</span>
                                </div>
                                <div class="bg-slate-800 rounded-lg p-2">
                                    <span class="text-blue-400">Correct prediction</span>
                                    <span class="block text-yellow-400 font-bold">+Bet × 2</span>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Game Modes -->
                        <div class="mt-4 pt-4 border-t border-white/10">
                            <p class="font-bold text-white mb-2">🎮 Game Modes:</p>
                            <div class="space-y-2 text-xs">
                                <div class="flex items-center gap-2">
                                    <span class="text-yellow-400">🎯</span>
                                    <span class="text-gray-300"><strong class="text-white">Single Player:</strong> Practice against AI bots</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-purple-400">👥</span>
                                    <span class="text-gray-300"><strong class="text-white">Multiplayer:</strong> Play with friends (2-100 players)</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- GenLayer Explainer -->
            <div class="glass rounded-xl p-4 max-w-md mx-auto mb-6 text-left">
                <p class="text-purple-400 font-bold text-sm mb-2">⛓️ Powered by GenLayer Intelligent Contracts</p>
                <div class="text-xs text-gray-400 space-y-1">
                    <p>✓ <strong class="text-white">Optimistic Democracy:</strong> Multiple AI validators judge jokes</p>
                    <p>✓ <strong class="text-white">Decentralized Consensus:</strong> No single AI decides - validators must agree</p>
                    <p>✓ <strong class="text-white">On-Chain Results:</strong> Winners verified and stored on blockchain</p>
                </div>
            </div>
            
            <div class="glass rounded-xl p-6 max-w-md mx-auto">
                <label class="text-sm text-gray-400 block mb-2 text-left">Your Name:</label>
                <input type="text" placeholder="Enter your name..." value="${state.playerName}"
                    oninput="state.playerName=this.value"
                    onkeypress="if(event.key==='Enter')goToLobby()"
                    class="w-full px-4 py-3 rounded-lg border border-slate-700 focus:border-purple-500 focus:outline-none text-lg mb-4">
                <button onclick="goToLobby()" class="btn w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl font-bold text-lg">
                    🎮 Enter Game
                </button>
            </div>
        </div>
    `;
}

function renderLobby() {
    return `
        <div class="space-y-6">
            <div class="text-center">
                <h2 class="text-3xl font-bold mb-2">🎪 Game Lobby</h2>
            </div>
            
            <!-- Single Player -->
            <div class="glass rounded-xl p-6 border-2 border-yellow-500/30">
                <h3 class="text-xl font-bold mb-3">🎯 Single Player <span class="text-yellow-400 text-sm">(Play with Bots)</span></h3>
                <p class="text-gray-400 text-sm mb-4">Practice mode - compete against AI opponents</p>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="createRoom('tech',true)" class="btn p-4 bg-gradient-to-br from-blue-600 to-cyan-600 rounded-xl">
                        <span class="text-2xl block mb-1">🤖</span><span class="text-sm">Tech</span>
                    </button>
                    <button onclick="createRoom('crypto',true)" class="btn p-4 bg-gradient-to-br from-yellow-600 to-orange-600 rounded-xl">
                        <span class="text-2xl block mb-1">💎</span><span class="text-sm">Crypto</span>
                    </button>
                    <button onclick="createRoom('general',true)" class="btn p-4 bg-gradient-to-br from-purple-600 to-pink-600 rounded-xl">
                        <span class="text-2xl block mb-1">😂</span><span class="text-sm">General</span>
                    </button>
                </div>
            </div>
            
            <!-- Multiplayer -->
            <div class="glass rounded-xl p-6">
                <h3 class="text-xl font-bold mb-3">👥 Multiplayer</h3>
                <p class="text-gray-400 text-sm mb-4">Create a room and invite friends</p>
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <button onclick="createRoom('tech',false)" class="btn p-3 bg-slate-700 hover:bg-slate-600 rounded-xl">
                        <span class="text-xl block">🤖</span><span class="text-xs">Tech</span>
                    </button>
                    <button onclick="createRoom('crypto',false)" class="btn p-3 bg-slate-700 hover:bg-slate-600 rounded-xl">
                        <span class="text-xl block">💎</span><span class="text-xs">Crypto</span>
                    </button>
                    <button onclick="createRoom('general',false)" class="btn p-3 bg-slate-700 hover:bg-slate-600 rounded-xl">
                        <span class="text-xl block">😂</span><span class="text-xs">General</span>
                    </button>
                </div>
                
                <div class="flex gap-2 mt-4">
                    <input type="text" id="room-code" placeholder="Enter room code..." 
                        onkeypress="if(event.key==='Enter')joinRoom(this.value)"
                        class="flex-1 px-4 py-2 rounded-lg border border-slate-700 focus:border-purple-500 focus:outline-none uppercase">
                    <button onclick="joinRoom(document.getElementById('room-code').value)" class="btn px-6 py-2 bg-green-600 rounded-lg font-bold">Join</button>
                </div>
                
                ${state.publicRooms.length > 0 ? `
                    <div class="mt-4 space-y-2">
                        <p class="text-sm text-gray-400">Open rooms:</p>
                        ${state.publicRooms.map(r => `
                            <div class="flex justify-between items-center p-2 bg-slate-800 rounded-lg">
                                <span class="font-mono text-purple-400">${r.id}</span>
                                <div class="flex items-center gap-2">
                                    <span class="text-xs text-gray-400">${r.players}/${r.maxPlayers}</span>
                                    <button onclick="joinRoom('${r.id}')" class="btn px-3 py-1 bg-purple-600 rounded text-sm">Join</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
            </div>
            
            ${state.leaderboard.length > 0 ? `
                <div class="glass rounded-xl p-6">
                    <h3 class="text-xl font-bold mb-4">🏆 Leaderboard</h3>
                    <div class="space-y-2">
                        ${state.leaderboard.slice(0,10).map((p,i) => `
                            <div class="flex justify-between items-center p-2 ${i<3?'bg-yellow-500/10':'bg-slate-800/50'} rounded-lg">
                                <div class="flex items-center gap-2">
                                    <span>${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</span>
                                    <span>${p.name}</span>
                                </div>
                                <span class="text-yellow-400 font-bold">${p.totalScore} XP</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            ` : ''}
        </div>
    `;
}

function renderWaiting() {
    if (!state.room) return '<div class="text-center py-20"><div class="spinner mx-auto"></div></div>';
    const r = state.room;
    return `
        <div class="glass rounded-xl p-6">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h2 class="text-2xl font-bold">${r.isSinglePlayer ? '🎯 Single Player' : r.id}</h2>
                    <span class="text-yellow-400 text-sm">${r.isSinglePlayer ? 'vs AI Bots' : '⏳ Waiting...'}</span>
                </div>
                <button onclick="leaveRoom()" class="text-gray-400 hover:text-white text-xl">✕</button>
            </div>
            
            ${!r.isSinglePlayer ? `
                <div class="mb-4 p-3 bg-slate-800 rounded-lg text-center">
                    <p class="text-sm text-gray-400">Share code:</p>
                    <div class="flex items-center justify-center gap-2 mt-1">
                        <p class="font-mono text-2xl text-purple-400 select-all">${r.id}</p>
                        <button onclick="copyRoomCode('${r.id}')" class="btn p-2 bg-purple-600 hover:bg-purple-500 rounded-lg" title="Copy code">
                            📋
                        </button>
                    </div>
                    <p id="copy-feedback" class="text-green-400 text-sm mt-1 hidden">Copied!</p>
                </div>
            ` : ''}
            
            <div class="mb-4">
                <h3 class="font-bold mb-2">👥 Players (${r.players.length})</h3>
                <div class="grid grid-cols-2 gap-2">
                    ${r.players.map(p => `
                        <div class="flex items-center gap-2 p-2 bg-slate-800 rounded-lg ${p.name===state.playerName?'ring-2 ring-purple-500':''}">
                            <span>${p.isHost?'👑':p.isBot?'🤖':'🎭'}</span>
                            <span class="truncate">${p.name}</span>
                            ${p.isBot?'<span class="text-xs bg-slate-600 px-1 rounded">BOT</span>':''}
                            ${p.name===state.playerName?'<span class="text-xs bg-purple-500 px-1 rounded">YOU</span>':''}
                        </div>
                    `).join('')}
                </div>
            </div>
            
            ${state.isHost ? `
                <button onclick="startGame()" ${!r.isSinglePlayer && r.players.length<2 ? 'disabled' : ''} 
                    class="btn w-full py-4 bg-gradient-to-r from-yellow-500 to-orange-500 rounded-xl font-bold text-lg">
                    ${!r.isSinglePlayer && r.players.length<2 ? '⏳ Need 2+ players' : '🚀 Start Game!'}
                </button>
            ` : '<div class="text-center py-4 text-gray-400"><div class="spinner mx-auto mb-2"></div>Waiting for host...</div>'}
        </div>
    `;
}

function renderSubmitting() {
    if (!state.room) return '<div class="text-center py-20"><div class="spinner mx-auto"></div></div>';
    const r = state.room;
    const submitted = r.submissions?.filter(s => !r.players.find(p => p.name === s.playerName)?.isBot).length || 0;
    const humanPlayers = r.players.filter(p => !p.isBot).length;
    
    return `
        <div class="space-y-4">
            ${renderTimer()}
            <div class="glass rounded-xl p-3 flex justify-between items-center">
                <span class="text-blue-400 font-bold">✍️ Round ${r.currentRound}/${r.totalRounds}</span>
                <span class="text-gray-400">${submitted}/${humanPlayers} submitted</span>
            </div>
            <div class="glass rounded-xl p-5 bg-gradient-to-r from-purple-900/30 to-pink-900/30 border border-purple-500/30">
                <p class="text-sm text-purple-300 mb-2">🤖 Complete this joke:</p>
                <p class="text-xl font-medium">"${r.jokePrompt}"</p>
            </div>
            ${!state.hasSubmitted ? `
                <div class="glass rounded-xl p-4">
                    <textarea id="punchline" maxlength="200" placeholder="Write your funniest punchline..."
                        oninput="state.punchlineText=this.value;setTyping();updateCharCount()"
                        onfocus="setTyping()"
                        onkeydown="setTyping()"
                        onkeyup="setTyping()"
                        class="w-full h-28 px-4 py-3 rounded-xl border border-slate-700 focus:border-purple-500 focus:outline-none text-lg resize-none">${state.punchlineText}</textarea>
                    <div class="flex justify-between items-center mt-3">
                        <span id="char-count" class="text-sm text-gray-400">${state.punchlineText.length}/200</span>
                        <button onclick="submitPunchline()" class="btn px-6 py-2 bg-gradient-to-r from-green-500 to-emerald-500 rounded-xl font-bold">📤 Submit</button>
                    </div>
                </div>
            ` : `
                <div class="glass rounded-xl p-6 text-center">
                    <div class="text-5xl mb-3">✅</div>
                    <p class="text-green-400 font-bold text-xl">Submitted!</p>
                    <p class="text-gray-400 mt-2">Waiting for timer to end...</p>
                </div>
            `}
            ${state.isHost && r.submissions.length >= 1 ? `
                <button onclick="advancePhase()" class="btn w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-xl">⏭️ Skip to Betting</button>
            ` : ''}
        </div>
    `;
}

function renderBetting() {
    if (!state.room) return '<div class="text-center py-20"><div class="spinner mx-auto"></div></div>';
    const r = state.room;
    const humanBets = r.bets?.filter(b => !r.players.find(p => p.name === b.playerName)?.isBot).length || 0;
    const humanPlayers = r.players.filter(p => !p.isBot).length;
    
    return `
        <div class="space-y-4">
            ${renderTimer()}
            <div class="glass rounded-xl p-3 flex justify-between items-center">
                <span class="text-purple-400 font-bold">🎯 Round ${r.currentRound} - BETTING</span>
                <span class="text-gray-400">${humanBets}/${humanPlayers} voted</span>
            </div>
            <div class="glass rounded-xl p-2">
                <p class="text-sm text-gray-400 truncate">"${r.jokePrompt}"</p>
            </div>
            <p class="text-center text-lg">🔮 Which will the AI pick as funniest?</p>
            <div class="space-y-3">
                ${r.submissions.map(s => `
                    <div onclick="selectSubmission(${s.id})" class="glass rounded-xl p-4 cursor-pointer hover:bg-white/10 ${state.selectedSubmission===s.id?'card-selected':''}">
                        <div class="flex items-start gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold ${state.selectedSubmission===s.id?'bg-purple-500':'bg-slate-700'}">#${s.id}</div>
                            <p class="flex-1">${s.punchline}</p>
                        </div>
                    </div>
                `).join('')}
            </div>
            ${!state.hasBet ? `
                <div class="glass rounded-xl p-4">
                    <div class="flex items-center gap-3 mb-3">
                        <span class="text-gray-400">Bet:</span>
                        <input type="range" min="10" max="100" step="10" value="${state.betAmount}" oninput="state.betAmount=+this.value;render()" class="flex-1 accent-purple-500">
                        <span class="text-xl font-bold text-yellow-400">${state.betAmount} XP</span>
                    </div>
                    <button onclick="placeBet()" ${!state.selectedSubmission?'disabled':''} class="btn w-full py-3 bg-gradient-to-r from-yellow-500 to-orange-500 rounded-xl font-bold">🎲 Bet on #${state.selectedSubmission||'?'}</button>
                </div>
            ` : `
                <div class="glass rounded-xl p-6 text-center">
                    <div class="text-5xl mb-3">🎲</div>
                    <p class="text-purple-400 font-bold text-xl">Bet Placed!</p>
                    <p class="text-gray-400 mt-2">Waiting for timer...</p>
                </div>
            `}
            ${state.isHost && r.bets.length >= 1 ? `
                <button onclick="advancePhase()" class="btn w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-xl">⏭️ Skip to Judging</button>
            ` : ''}
        </div>
    `;
}

function renderJudging() {
    return `
        <div class="glass rounded-2xl p-8 text-center">
            <div class="w-28 h-28 oracle-eye rounded-full flex items-center justify-center mx-auto mb-6 animate-glow">
                <span class="text-6xl">👁️</span>
            </div>
            <h2 class="text-2xl font-bold mb-4">The Oracle Judges...</h2>
            
            <!-- Optimistic Democracy Visualization -->
            <div class="glass rounded-xl p-4 mb-4 text-left">
                <p class="text-purple-400 font-bold text-sm mb-3">⛓️ GenLayer Optimistic Democracy</p>
                <div class="space-y-2 text-sm">
                    <div class="flex items-center gap-2">
                        <span class="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center text-xs animate-pulse">1</span>
                        <span class="text-gray-300">Leader validator evaluates submissions...</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-6 h-6 bg-yellow-500 rounded-full flex items-center justify-center text-xs animate-pulse" style="animation-delay:0.3s">2</span>
                        <span class="text-gray-300">Other validators verify independently...</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-6 h-6 bg-purple-500 rounded-full flex items-center justify-center text-xs animate-pulse" style="animation-delay:0.6s">3</span>
                        <span class="text-gray-300">Reaching consensus on funniest joke...</span>
                    </div>
                </div>
            </div>
            
            <p class="text-gray-400 mb-4 text-sm">Multiple AI models reaching decentralized consensus</p>
            <div class="flex justify-center gap-2">
                ${[0,1,2,3,4].map(i => `<div class="w-3 h-3 bg-purple-500 rounded-full animate-pulse" style="animation-delay:${i*0.15}s"></div>`).join('')}
            </div>
            
            <div class="mt-4 text-xs text-gray-500">
                Powered by GenLayer Intelligent Contracts
            </div>
        </div>
    `;
}

function renderRoundResults() {
    if (!state.room) return '<div class="text-center py-20"><div class="spinner mx-auto"></div></div>';
    const r = state.room;
    const result = r.roundResults[r.roundResults.length - 1];
    if (!result) return renderJudging();
    
    // Determine judging method badge
    const judgingMethod = result.judgingMethod || r.lastJudgingMethod || 'ai';
    const methodBadge = judgingMethod === 'genlayer_optimistic_democracy' 
        ? '<span class="text-xs bg-green-600 px-2 py-0.5 rounded-full">⛓️ On-Chain Verified</span>'
        : judgingMethod === 'claude_api'
        ? '<span class="text-xs bg-blue-600 px-2 py-0.5 rounded-full">🤖 AI Judged</span>'
        : '<span class="text-xs bg-gray-600 px-2 py-0.5 rounded-full">🎲 Random</span>';
    
    return `
        <div class="space-y-4">
            <div class="glass rounded-xl p-6 bg-gradient-to-r from-yellow-500/20 to-orange-500/20 border border-yellow-500/50 text-center">
                <div class="text-5xl mb-3">👑</div>
                <p class="text-yellow-400 text-sm">Round ${result.round} Winner!</p>
                <p class="text-xl font-bold my-2">"${result.winningPunchline}"</p>
                <p class="text-gray-400">by <span class="text-white font-bold">${result.winnerName}</span></p>
                <p class="text-green-400 mt-1">+100 XP</p>
                <div class="mt-2">${methodBadge}</div>
            </div>
            
            ${judgingMethod === 'genlayer_optimistic_democracy' ? `
                <div class="glass rounded-xl p-3 border border-green-500/30">
                    <div class="flex items-center gap-2 text-sm">
                        <span class="text-green-400">✓</span>
                        <span class="text-gray-300">Verified by GenLayer Optimistic Democracy</span>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">Multiple AI validators reached consensus on this result</p>
                </div>
            ` : ''}
            
            <div class="glass rounded-xl p-4">
                <h3 class="font-bold mb-3">📊 Standings</h3>
                <div class="space-y-2">
                    ${[...r.players].sort((a,b)=>b.score-a.score).map((p,i) => `
                        <div class="flex justify-between items-center p-2 ${p.name===state.playerName?'bg-purple-500/20 ring-1 ring-purple-500':'bg-slate-800'} rounded-lg">
                            <div class="flex items-center gap-2">
                                <span>${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</span>
                                <span>${p.name}</span>
                                ${p.isBot?'<span class="text-xs bg-slate-600 px-1 rounded">BOT</span>':''}
                            </div>
                            <span class="text-yellow-400 font-bold">${p.score} XP</span>
                        </div>
                    `).join('')}
                </div>
            </div>
            ${state.isHost ? `
                <button onclick="nextRound()" class="btn w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl font-bold text-lg">
                    ${r.currentRound >= r.totalRounds ? '🏆 Final Results' : '➡️ Next Round'}
                </button>
            ` : '<div class="text-center py-4 text-gray-400"><div class="spinner mx-auto mb-2"></div>Waiting for host...</div>'}
        </div>
    `;
}

function renderFinalResults() {
    if (!state.room) return '<div class="text-center py-20"><div class="spinner mx-auto"></div></div>';
    const r = state.room;
    const standings = [...r.players].sort((a,b)=>b.score-a.score);
    const winner = standings[0];
    const playerRank = standings.findIndex(p=>p.name===state.playerName)+1;
    const isWinner = playerRank === 1;
    
    return `
        <div class="space-y-4">
            <div class="text-center py-4">
                <div class="text-7xl mb-3">${isWinner?'🎉':'🏆'}</div>
                <h2 class="text-3xl font-bold">Game Over!</h2>
            </div>
            <div class="glass rounded-xl p-6 bg-gradient-to-r from-yellow-500/20 to-orange-500/20 border border-yellow-500/50 text-center">
                <p class="text-yellow-400 text-sm">🎉 Winner!</p>
                <p class="text-3xl font-bold">${winner.name}</p>
                <p class="text-2xl text-yellow-400 mt-1">${winner.score} XP</p>
                ${winner.isBot ? '<p class="text-gray-400 text-sm">(Bot)</p>' : ''}
            </div>
            <div class="glass rounded-xl p-4">
                <h3 class="font-bold mb-3">🏅 Final Standings</h3>
                <div class="space-y-2">
                    ${standings.map((p,i) => `
                        <div class="flex justify-between items-center p-2 ${p.name===state.playerName?'bg-purple-500/20 ring-1 ring-purple-500':i<3?'bg-yellow-500/10':'bg-slate-800'} rounded-lg">
                            <div class="flex items-center gap-2">
                                <span class="text-lg">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</span>
                                <span>${p.name}</span>
                                ${p.isBot?'<span class="text-xs bg-slate-600 px-1 rounded">BOT</span>':''}
                                ${p.name===state.playerName?'<span class="text-xs bg-purple-500 px-1 rounded">YOU</span>':''}
                            </div>
                            <span class="text-yellow-400 font-bold">${p.score} XP</span>
                        </div>
                    `).join('')}
                </div>
            </div>
            ${isWinner && !winner.isBot ? '<p class="text-center text-2xl animate-pulse">🎉 You Won! 🎉</p>' : `<p class="text-center text-gray-400">You finished #${playerRank}</p>`}
            <button onclick="leaveRoom()" class="btn w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl font-bold text-lg">🎮 Play Again</button>
        </div>
    `;
}

render();
</script>
</body>
</html>
